// ─── TAB 3: ATTENDANCE ────────────────────────────────────────────────────────
function AttTab({modules,subjects,lectures,setLectures,att,target,setTarget,overall,moduleStats,subStats,heldLecs,setLecOpen,needMore,canSkip,needMoreFromScheduled,canSkipFromScheduled}){
  const[expanded,setExpanded]=useState(null);
  const[reassignLec,setReassignLec]=useState(null);
  const ov=overall();
  const ovScheduled=lectures.filter(l=>l.subjectId!=null&&att[l.id]!=="cancelled"&&att[l.id]!=="holiday").length;
  const pctOfSched=ovScheduled>0?pct(ov.attended,ovScheduled):0;
  return(
    <div className="slide">
      <div className="card" style={{padding:18,marginTop:18,marginBottom:14}}>
        <div style={{display:"flex",gap:14,alignItems:"center",marginBottom:12}}>
          <div style={{position:"relative",width:86,height:86,flexShrink:0}}>
            <Ring value={ov.pct} target={target} size={86} stroke={9} color={T.primary}/>
            <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
              <div style={{fontSize:20,fontWeight:800,color:ov.pct>=target?T.primary:"#EF4444"}}>{ov.pct}%</div>
            </div>
          </div>
          <div style={{flex:1}}>
            <div style={{fontWeight:800,fontSize:16,marginBottom:2,color:T.text}}>Overall Attendance</div>
            <div style={{color:T.textMuted,fontSize:12,marginBottom:6}}>{ov.attended} attended · {ov.total} held · {ovScheduled} scheduled</div>
            <div style={{display:"flex",gap:6}}>
              {[75,80,85].map(t=><button key={t} className="btn" onClick={()=>setTarget(t)} style={{padding:"4px 11px",fontSize:12,background:target===t?T.primary:T.cream,color:target===t?"#fff":T.textSub,borderRadius:9}}>{t}%</button>)}
            </div>
          </div>
        </div>
        {/* Option 1: % of held */}
        <div style={{background:T.cream,borderRadius:12,padding:"10px 13px",marginBottom:8}}>
          <div style={{fontSize:11,fontWeight:700,color:T.textMuted,marginBottom:3}}>📌 OF HELD CLASSES ({ov.pct}%)</div>
          <div style={{fontSize:13,fontWeight:700,color:ov.pct>=target?"#2DB8AB":"#EF4444"}}>
            {ov.pct>=target
              ?`✅ Currently on track — can miss ${canSkip(ov.attended,ov.total,target)} more held`
              :`⚠️ You are currently ${needMore(ov.attended,ov.total,target)} class(es) short of the target for sessions held so far`}
          </div>
        </div>
        {/* Option 2: % of scheduled */}
        <div style={{background:"#F0FDF4",borderRadius:12,padding:"10px 13px"}}>
          <div style={{fontSize:11,fontWeight:700,color:"#166534",marginBottom:3}}>📅 OF ALL SCHEDULED ({pctOfSched}%)</div>
          <div style={{fontSize:13,fontWeight:700,color:pctOfSched>=target?"#2DB8AB":"#F59E0B"}}>
            {pctOfSched>=target
              ?`✅ Safe — can skip ${canSkipFromScheduled(ov.attended,ov.total,ovScheduled,target)} remaining`
              :needMoreFromScheduled(ov.attended,ov.total,ovScheduled,target)===Infinity
                ?`🚫 Mathematical impossibility — target ${target}% cannot be reached with remaining classes`
                :`⚠️ Must attend ${needMoreFromScheduled(ov.attended,ov.total,ovScheduled,target)} of ${ovScheduled-ov.total} remaining`}
          </div>
        </div>
      </div>

      {/* Module-wise */}
      {modules.length>0&&(
        <div className="card" style={{padding:"12px 15px",marginBottom:14}}>
          <div style={{fontWeight:700,fontSize:13,marginBottom:10,color:T.text}}>Module-wise Attendance</div>
          {modules.map(m=>{
            const st=moduleStats(m.id);
            return(
              <div key={m.id} style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
                <div style={{width:8,height:8,borderRadius:2,background:m.color,flexShrink:0}}/>
                <div style={{flex:1,fontSize:13,fontWeight:600,color:T.text}}>{m.name}</div>
                <div style={{width:80,height:6,background:T.border,borderRadius:3}}>
                  <div style={{width:`${st.pct}%`,height:"100%",background:st.pct>=target?m.color:"#EF4444",borderRadius:3}}/>
                </div>
                <div style={{fontSize:13,fontWeight:800,color:st.pct>=target?m.color:"#EF4444",minWidth:36,textAlign:"right"}}>{st.pct}%</div>
                <div style={{fontSize:11,color:T.textMuted,minWidth:44,textAlign:"right"}}>{st.attended}/{st.total}</div>
              </div>
            );
          })}
        </div>
      )}

      {subjects.length===0&&<div className="card" style={{padding:32,textAlign:"center",color:T.textMuted}}><div style={{fontSize:32,marginBottom:8}}>📊</div>Import a timetable to begin</div>}

      {subjects.filter(sub=>lectures.some(l=>l.subjectId===sub.id&&!l._unassigned)).map(sub=>{
        const st=subStats(sub.id);
        const isExp=expanded===sub.id;
        const subLecs=lectures.filter(l=>l.subjectId===sub.id&&!l._unassigned&&l.date).sort((a,b)=>a.date.localeCompare(b.date));
        const pctOfScheduled=st.scheduled>0?pct(st.attended,st.scheduled):0;
        const moreFromHeld=needMore(st.attended,st.total,target);
        const moreFromSched=needMoreFromScheduled(st.attended,st.total,st.scheduled,target);
        const skipFromHeld=canSkip(st.attended,st.total,target);
        const skipFromSched=canSkipFromScheduled(st.attended,st.total,st.scheduled,target);
        return(
          <div key={sub.id} className="card" style={{marginBottom:12,overflow:"hidden"}}>
            <div style={{padding:"14px 15px 12px",cursor:"pointer"}} onClick={()=>setExpanded(isExp?null:sub.id)}>
              <div style={{display:"flex",alignItems:"center",gap:12}}>
                <div style={{position:"relative",width:62,height:62,flexShrink:0}}>
                  <Ring value={st.pct} target={target} size={62} stroke={7} color={sub.color}/>
                  <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
                    <span style={{fontSize:13,fontWeight:800,color:st.pct>=target?sub.color:"#EF4444"}}>{st.pct}%</span>
                  </div>
                </div>
                <div style={{flex:1}}>
                  <div style={{fontWeight:800,fontSize:15,color:T.text}}>{sub.name}</div>
                  <div style={{fontSize:11,color:T.textMuted,marginBottom:5}}>
                    {st.attended}/{st.total} held · {st.scheduled} scheduled
                  </div>
                  {/* Option 1 */}
                  <div style={{fontSize:11,fontWeight:700,color:st.pct>=target?"#2DB8AB":"#EF4444",marginBottom:2}}>
                    📌 {st.pct}% of held: {st.pct>=target?`✅ currently on track`:`⚠️ ${moreFromHeld} class(es) short of target for held sessions`}
                  </div>
                  {/* Option 2 */}
                  <div style={{fontSize:11,fontWeight:700,color:pctOfScheduled>=target?"#2DB8AB":"#F59E0B"}}>
                    📅 {pctOfScheduled}% of scheduled: {pctOfScheduled>=target?`✅ can skip ${skipFromSched} remaining`:moreFromSched===Infinity?`🚫 target ${target}% unreachable with remaining classes`:`⚠️ must attend ${moreFromSched} of ${st.scheduled-st.total} remaining`}
                  </div>
                </div>
                <span style={{color:T.border,fontSize:14}}>{isExp?"▲":"▼"}</span>
              </div>
            </div>
            {isExp&&(
              <div style={{borderTop:`1px solid ${T.border}`}}>
                <SubjectMiniCal sub={sub} lectures={subLecs} att={att} setLecOpen={setLecOpen} target={target}/>
                <div style={{padding:"8px 15px 12px"}}>
                  {(()=>{
                    const today=todayISO();
                    const past=subLecs.filter(l=>l.date&&l.date<=today).slice(-5).reverse();
                    const future=subLecs.filter(l=>l.date&&l.date>today).slice(0,3);
                    return[...past,...future].map(l=>{
                      const sm=att[l.id]?STATUS[att[l.id]]:{icon:"⬜",label:"Unmarked",fg:T.textMuted};
                      const isFut=l.date>today;
                      return(
                        <div key={l.id} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 0",borderBottom:`1px solid ${T.cream}`,cursor:"pointer"}} onClick={()=>setLecOpen(l)}>
                          <span style={{fontSize:14}}>{isFut?"📅":sm.icon}</span>
                          <div style={{flex:1,minWidth:0}}>
                            <div style={{fontSize:12,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",color:att[l.id]==="cancelled"?T.textMuted:isFut?"#6C63FF":T.text,textDecoration:att[l.id]==="cancelled"?"line-through":"none"}}>{l.topic}</div>
                            <div style={{fontSize:10,color:isFut?"#6C63FF":sm.fg}}>{dispDate(l.date)} · {isFut?"Upcoming":sm.label}</div>
                          </div>
                          <span style={{fontSize:10,color:T.textMuted}}>Edit ›</span>
                        </div>
                      );
                    });
                  })()}
                </div>
              </div>
            )}
          </div>
        );
      })}

      {/* ── Unassigned / Undetected Lectures ── */}
      {(()=>{
        const unassigned=lectures.filter(l=>l._unassigned||l.subjectId==null);
        if(!unassigned.length)return null;
        return(
          <div style={{marginTop:10}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8,padding:"0 2px"}}>
              <span style={{fontSize:16}}>⚠️</span>
              <div style={{fontWeight:800,fontSize:13,color:"#EF4444"}}>Unassigned Lectures ({unassigned.length})</div>
              <div style={{fontSize:10,color:T.textMuted,flex:1}}>Department not detected — tap Assign to place in correct subject</div>
            </div>
            {unassigned.map(l=>(
              <div key={l.id} className="card" style={{marginBottom:7,padding:"10px 14px",borderLeft:"4px solid #EF4444"}}>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:13,fontWeight:700,color:T.text,marginBottom:5,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{l.topic}</div>
                    <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                      {l.date&&<span style={{fontSize:12,fontWeight:600,color:T.primary,background:T.cream,padding:"2px 8px",borderRadius:6}}>📅 {dispDate(l.date)}</span>}
                      {l.start&&<span style={{fontSize:12,fontWeight:600,color:"#166534",background:"#F0FDF4",padding:"2px 8px",borderRadius:6}}>🕐 {fmt12(l.start)}{l.end?` – ${fmt12(l.end)}`:""}</span>}
                      {l.code&&<span style={{fontSize:10,color:T.textMuted,padding:"2px 6px",background:T.bg,borderRadius:6}}>{l.code}</span>}
                    </div>
                  </div>
                  <button className="btn" onClick={()=>setReassignLec(l)}
                    style={{padding:"7px 13px",background:"#FFF1F1",color:"#EF4444",fontSize:12,fontWeight:700,border:"1px solid #FECACA",flexShrink:0,whiteSpace:"nowrap"}}>
                    Assign →
                  </button>
                </div>
              </div>
            ))}
          </div>
        );
      })()}

      {/* Reassign bottom sheet */}
      {reassignLec&&(
        <AssignSheet lec={reassignLec} subjects={subjects}
          onAssign={(sid,date,start,end)=>{
            setLectures(p=>p.map(l=>l.id===reassignLec.id?{...l,subjectId:sid,_unassigned:false,date,start,end}:l));
            setReassignLec(null);
          }}
          onClose={()=>setReassignLec(null)}/>
      )}
    </div>
  );
}

// ─── ASSIGN SHEET ─────────────────────────────────────────────────────────────
function AssignSheet({lec,subjects,onAssign,onClose}){
  const[selDate,setSelDate]=useState(lec.date||todayISO());
  const[selStart,setSelStart]=useState(lec.start||"08:00");
  const[selEnd,setSelEnd]=useState(lec.end||"08:45");
  const needsDate=!lec.date;
  const needsTime=!lec.start;
  const doAssign=(sid)=>{
    onAssign(sid,needsDate?selDate:lec.date,needsTime?selStart:lec.start,needsTime?selEnd:lec.end);
  };
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",zIndex:200,display:"flex",alignItems:"flex-end"}}
      onClick={onClose}>
      <div style={{background:T.white,borderRadius:"20px 20px 0 0",width:"100%",maxWidth:480,margin:"0 auto",padding:"20px 20px 32px",maxHeight:"85vh",overflowY:"auto"}}
        onClick={e=>e.stopPropagation()}>
        <div style={{fontWeight:800,fontSize:16,color:T.text,marginBottom:2}}>Assign to Subject</div>
        <div style={{fontSize:12,color:T.textMuted,marginBottom:10,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{lec.topic}</div>
        {(needsDate||needsTime)&&(
          <div style={{background:"#FFF7ED",border:"1px solid #FED7AA",borderRadius:12,padding:"12px 14px",marginBottom:14}}>
            <div style={{fontSize:12,fontWeight:700,color:"#C2410C",marginBottom:8}}>⚠️ Missing info — fill in before assigning:</div>
            {needsDate&&(
              <div style={{marginBottom:8}}>
                <label style={{fontSize:11,fontWeight:600,color:T.textSub,display:"block",marginBottom:3}}>Date</label>
                <input type="date" value={selDate} onChange={e=>setSelDate(e.target.value)}
                  style={{fontFamily:"inherit",border:`1.5px solid ${T.border}`,borderRadius:10,padding:"8px 12px",fontSize:13,width:"100%",background:T.white}}/>
              </div>
            )}
            {needsTime&&(
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                <div>
                  <label style={{fontSize:11,fontWeight:600,color:T.textSub,display:"block",marginBottom:3}}>Start Time</label>
                  <input type="time" value={selStart} onChange={e=>setSelStart(e.target.value)}
                    style={{fontFamily:"inherit",border:`1.5px solid ${T.border}`,borderRadius:10,padding:"8px 12px",fontSize:13,width:"100%",background:T.white}}/>
                </div>
                <div>
                  <label style={{fontSize:11,fontWeight:600,color:T.textSub,display:"block",marginBottom:3}}>End Time</label>
                  <input type="time" value={selEnd} onChange={e=>setSelEnd(e.target.value)}
                    style={{fontFamily:"inherit",border:`1.5px solid ${T.border}`,borderRadius:10,padding:"8px 12px",fontSize:13,width:"100%",background:T.white}}/>
                </div>
              </div>
            )}
          </div>
        )}
        <div style={{fontSize:11,fontWeight:700,color:T.textMuted,marginBottom:8,textTransform:"uppercase",letterSpacing:0.5}}>Select Subject</div>
        <div style={{maxHeight:280,overflowY:"auto"}}>
          {subjects.map(s=>(
            <div key={s.id} onClick={()=>doAssign(s.id)}
              style={{display:"flex",alignItems:"center",gap:10,padding:"11px 13px",borderRadius:10,marginBottom:7,background:T.cream,cursor:"pointer",border:`1px solid ${T.border}`}}>
              <div style={{width:12,height:12,borderRadius:3,background:s.color,flexShrink:0}}/>
              <div style={{fontWeight:600,fontSize:13,color:T.text,flex:1}}>{s.name}</div>
              <span style={{fontSize:11,color:T.textMuted}}>›</span>
            </div>
          ))}
        </div>
        <button className="btn" onClick={onClose}
          style={{width:"100%",padding:11,background:T.cream,color:T.textSub,fontSize:13,marginTop:8}}>Cancel</button>
      </div>
    </div>
  );
}

function SubjectMiniCal({sub,lectures,att,setLecOpen,target}){
  const n=new Date();
  // Start on the month of the earliest lecture, or current month if none
  const firstLecDate=lectures.filter(l=>l.date).map(l=>l.date).sort()[0];
  const initDate=firstLecDate?new Date(firstLecDate+"T12:00:00"):n;
  const[yr,setYr]=useState(initDate.getFullYear());
  const[mo,setMo]=useState(initDate.getMonth());
  const days=new Date(yr,mo+1,0).getDate(),first=new Date(yr,mo,1).getDay();
  const[multiDay,setMultiDay]=useState(null);
  const byDate={};
  lectures.filter(l=>l.date).forEach(l=>{if(!byDate[l.date])byDate[l.date]=[];byDate[l.date].push(l);});
  return(
    <div style={{padding:"10px 15px 0"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:7}}>
        <button className="btn" onClick={()=>{if(mo===0){setYr(y=>y-1);setMo(11);}else setMo(m=>m-1);}} style={{padding:"3px 10px",background:T.cream,color:T.text,fontSize:12}}>‹</button>
        <div style={{fontSize:12,fontWeight:700,color:sub.color}}>{new Date(yr,mo,1).toLocaleDateString("en-IN",{month:"short",year:"numeric"})} — {sub.name}</div>
        <button className="btn" onClick={()=>{if(mo===11){setYr(y=>y+1);setMo(0);}else setMo(m=>m+1);}} style={{padding:"3px 10px",background:T.cream,color:T.text,fontSize:12}}>›</button>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:2}}>
        {["S","M","T","W","T","F","S"].map((d,i)=><div key={i} style={{textAlign:"center",fontSize:9,fontWeight:700,color:T.textMuted}}>{d}</div>)}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:10}}>
        {Array.from({length:first}).map((_,i)=><div key={"e"+i}/>)}
        {Array.from({length:days}).map((_,i)=>{
          const day=i+1,iso=`${yr}-${String(mo+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
          const lecs=byDate[iso]||[],hasLec=lecs.length>0,isToday=iso===todayISO();
          const statuses=lecs.map(l=>att[l.id]).filter(Boolean);
          let bg=T.cream,textCol=T.textMuted;
          if(hasLec){
            if(!statuses.length){bg="#EEF0FF";textCol=T.primary;}
            else if(statuses.every(s=>s==="attended")){bg="#22C55E";textCol="#fff";}
            else if(statuses.every(s=>s==="missed")){bg="#EF4444";textCol="#fff";}
            else if(statuses.every(s=>s==="cancelled")){bg="#374151";textCol="#fff";}
            else if(statuses.every(s=>s==="holiday")){bg="#F59E0B";textCol="#fff";}
            else{bg="#FEF9C3";textCol="#92400E";}
          }
          return(
            <div key={day} onClick={()=>{if(hasLec){if(lecs.length===1)setLecOpen(lecs[0]);else setMultiDay(iso===multiDay?null:iso);}}}
              style={{height:26,borderRadius:5,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:bg,cursor:hasLec?"pointer":"default",border:isToday?`2px solid ${sub.color}`:`1.5px solid ${T.border}`,fontSize:10,fontWeight:hasLec?700:400,color:textCol,transition:"background .15s",position:"relative"}}>
              {day}
              {lecs.length>1&&<div style={{position:"absolute",top:1,right:2,fontSize:7,fontWeight:800,color:textCol,opacity:0.85}}>{lecs.length}</div>}
            </div>
          );
        })}
      </div>
      <div style={{display:"flex",gap:7,flexWrap:"wrap",paddingBottom:10}}>
        {[["#22C55E","Attended"],["#EF4444","Missed"],["#374151","Cancelled"],["#F59E0B","Holiday"],["#EEF0FF","Scheduled"]].map(([c,l])=>(
          <div key={l} style={{display:"flex",alignItems:"center",gap:4,fontSize:9,color:T.textMuted}}>
            <div style={{width:9,height:9,borderRadius:2,background:c}}/>{l}
          </div>
        ))}
      </div>
      {multiDay&&byDate[multiDay]&&(
        <div style={{background:T.cream,borderRadius:10,padding:"10px 12px",marginBottom:10}}>
          <div style={{fontSize:11,fontWeight:700,color:T.textMuted,marginBottom:6}}>📅 {dispDate(multiDay)} — {byDate[multiDay].length} lectures</div>
          {byDate[multiDay].map(l=>{
            const sm=att[l.id]?STATUS[att[l.id]]:{icon:"⬜",label:"Unmarked",fg:T.textMuted};
            return(
              <div key={l.id} onClick={()=>{setLecOpen(l);setMultiDay(null);}} style={{display:"flex",alignItems:"center",gap:8,padding:"5px 0",borderBottom:`1px solid ${T.border}`,cursor:"pointer"}}>
                <span style={{fontSize:13}}>{sm.icon}</span>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:12,fontWeight:600,color:T.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{l.topic}</div>
                  <div style={{fontSize:10,color:sm.fg}}>{fmt12(l.start)} · {sm.label}</div>
                </div>
                <span style={{fontSize:10,color:T.textMuted}}>›</span>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ─── TAB 4: SUBJECTS ──────────────────────────────────────────────────────────

// ─── TAB 4: SUBJECTS ──────────────────────────────────────────────────────────
function SubjectsTab({subjects,setSubjects,lectures,setLectures,att,setAtt,subStats,target,setEditSubOpen,deleteSub,setAddLecDate,setEditLecOpen,setLecOpen,setAddSubOpen}){
  const[expandedSub,setExpandedSub]=useState(null);
  const[reassignLec,setReassignLec]=useState(null);
  const unassigned=lectures.filter(l=>l._unassigned||l.subjectId==null);
  return(
    <div className="slide">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:18,marginBottom:14}}>
        <div style={{fontWeight:800,fontSize:15,color:T.text}}>Subjects & Lectures</div>
        <button className="btn" onClick={()=>setAddSubOpen(true)} style={{padding:"7px 13px",background:T.primary,color:"#fff",fontSize:13}}>+ Subject</button>
      </div>

      {/* ── Unassigned Lectures Card ── */}
      {unassigned.length>0&&(
        <div className="card" style={{marginBottom:14,overflow:"hidden",border:`2px solid #FCA5A5`}}>
          <div style={{padding:"11px 15px 9px",background:"#FFF1F1",borderBottom:`1px solid #FCA5A5`,display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontSize:18}}>📋</span>
            <div style={{flex:1}}>
              <div style={{fontWeight:800,fontSize:14,color:"#DC2626"}}>Unassigned Lectures ({unassigned.length})</div>
              <div style={{fontSize:11,color:"#7F1D1D",marginTop:1}}>Department not auto-detected — assign each to the correct subject</div>
            </div>
          </div>
          <div style={{padding:"8px 14px 12px"}}>
            {unassigned.map(l=>(
              <div key={l.id} style={{padding:"10px 0",borderBottom:`1px solid ${T.cream}`}}>
                <div style={{fontWeight:700,fontSize:13,color:T.text,marginBottom:6}}>{l.topic}</div>
                <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                  <span style={{fontSize:12,fontWeight:600,color:T.primary,background:T.cream,padding:"3px 9px",borderRadius:7}}>
                    📅 {l.date?dispDate(l.date):<span style={{color:"#EF4444"}}>No date</span>}
                  </span>
                  <span style={{fontSize:12,fontWeight:600,color:"#166534",background:"#F0FDF4",padding:"3px 9px",borderRadius:7}}>
                    🕐 {l.start?`${fmt12(l.start)}${l.end?` – ${fmt12(l.end)}`:""}` : <span style={{color:"#EF4444"}}>No time</span>}
                  </span>
                  {l.code&&<span style={{fontSize:10,color:T.textMuted,padding:"3px 7px",background:T.bg,borderRadius:7}}>{l.code}</span>}
                  <button className="btn" onClick={()=>setReassignLec(l)}
                    style={{marginLeft:"auto",padding:"6px 14px",background:"#DC2626",color:"#fff",fontSize:12,fontWeight:700,flexShrink:0}}>
                    Assign →
                  </button>
                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      {subjects.length===0&&unassigned.length===0&&(
        <div className="card" style={{padding:30,textAlign:"center",color:T.textMuted}}>
          <div style={{fontSize:30,marginBottom:7}}>{"📚"}</div>No subjects yet
        </div>
      )}
      {subjects.map(sub=>{
        const st=subStats(sub.id);
        const subLecs=lectures.filter(l=>l.subjectId===sub.id&&!l._unassigned&&l.date).sort((a,b)=>a.date.localeCompare(b.date));
        const isExp=expandedSub===sub.id;
        return(
          <div key={sub.id} className="card" style={{marginBottom:11,overflow:"hidden"}}>
            <div style={{padding:"12px 14px",borderLeft:`5px solid ${sub.color}`}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div style={{cursor:"pointer",flex:1}} onClick={()=>setExpandedSub(isExp?null:sub.id)}>
                  <div style={{fontWeight:800,fontSize:14,color:sub.color}}>{sub.name}</div>
                  <div style={{fontSize:12,color:T.textMuted,marginTop:1}}>{subLecs.length} lectures · {st.attended}/{st.total} attended · {st.pct}%</div>
                </div>
                <div style={{display:"flex",gap:5}}>
                  <button className="btn" onClick={()=>setEditSubOpen(sub)} style={{padding:"4px 9px",background:T.goldPale,color:T.gold,fontSize:11,border:`1px solid ${T.gold}40`}}>{"✏️"}</button>
                  <button className="btn" onClick={()=>deleteSub(sub.id)} style={{padding:"4px 9px",background:"#FFE8E8",color:"#EF4444",fontSize:11}}>{"🗑️"}</button>
                </div>
              </div>
            </div>
            {isExp&&(
              <div style={{padding:"8px 14px 12px",borderTop:`1px solid ${T.border}`}}>
                <div style={{display:"flex",justifyContent:"flex-end",marginBottom:8}}>
                  <button className="btn" onClick={()=>setAddLecDate(todayISO())} style={{padding:"5px 11px",background:T.primary,color:"#fff",fontSize:12}}>+ Add Lecture</button>
                </div>
                {subLecs.map(l=>{
                  const sm=att[l.id]?STATUS[att[l.id]]:null;
                  return(
                    <div key={l.id} style={{display:"flex",alignItems:"center",gap:8,padding:"5px 0",borderBottom:`1px solid ${T.cream}`}}>
                      <span style={{fontSize:13,cursor:"pointer"}} onClick={()=>setLecOpen(l)}>{sm?sm.icon:isPast(l.date)?"⬜":"🔜"}</span>
                      <div style={{flex:1,minWidth:0,cursor:"pointer"}} onClick={()=>setLecOpen(l)}>
                        <div style={{fontSize:12,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",color:T.text}}>{l.topic}</div>
                        <div style={{fontSize:10,color:T.textMuted}}>{dispDate(l.date)}{l.start?` · ${fmt12(l.start)}`:""}</div>
                      </div>
                      <button className="btn" onClick={()=>setEditLecOpen(l)} style={{padding:"3px 8px",background:T.goldPale,color:T.gold,fontSize:10,borderRadius:7,border:`1px solid ${T.gold}40`}}>{"✏️"}</button>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        );
      })}

      {/* Assign bottom sheet */}
      {reassignLec&&(
        <AssignSheet lec={reassignLec} subjects={subjects}
          onAssign={(sid,date,start,end)=>{
            setLectures(p=>p.map(l=>l.id===reassignLec.id?{...l,subjectId:sid,_unassigned:false,date,start,end}:l));
            setReassignLec(null);
          }}
          onClose={()=>setReassignLec(null)}/>
      )}
    </div>
  );
}

// ─── TAB 5: WARD ──────────────────────────────────────────────────────────────
function WardTab({wardCalYear,wardCalMonth,setWardCalYear,setWardCalMonth,wardSchedule,wardRoster,wardManual,setWardManual,wardAtt,markWard,sessionsPerDay,setSessionsPerDay,currentWard,rosterForDate,wardSessionsOnDate,setWardImportOpen,openWardImport,setWardDayOpen,setEditWardSession,setManageWardOpen}){
  const today=todayISO();
  const days=new Date(wardCalYear,wardCalMonth+1,0).getDate(),first=new Date(wardCalYear,wardCalMonth,1).getDay();
  const prevMonth=()=>{if(wardCalMonth===0){setWardCalYear(y=>y-1);setWardCalMonth(11);}else setWardCalMonth(m=>m-1);};
  const nextMonth=()=>{if(wardCalMonth===11){setWardCalYear(y=>y+1);setWardCalMonth(0);}else setWardCalMonth(m=>m+1);};
  const monthLabel=new Date(wardCalYear,wardCalMonth,1).toLocaleDateString("en-IN",{month:"long",year:"numeric"});
  const weeks=[];const total=first+days;
  for(let w=0;w<Math.ceil(total/7);w++){const week=[];for(let d=0;d<7;d++){const ci=w*7+d,day=ci-first+1;week.push(day>=1&&day<=days?day:null);}weeks.push(week);}
  return(
    <div className="slide" style={{paddingTop:16}}>
      <div style={{display:"flex",gap:6,marginBottom:8}}>
        <button className="btn" onClick={()=>setManageWardOpen(true)} style={{flex:1,padding:"9px 0",background:"#22C55E",color:"#fff",fontSize:11}}>{"🏥"} Manage</button>
        <button className="btn" onClick={()=>openWardImport("schedule")} style={{flex:1,padding:"9px 0",background:"#16A34A",color:"#fff",fontSize:11}}>{"📋"} Schedule</button>
        <button className="btn" onClick={()=>openWardImport("roster")} style={{flex:1,padding:"9px 0",background:"#0F8A3C",color:"#fff",fontSize:11}}>{"📅"} Roster</button>
      </div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",background:T.card,padding:"8px 12px",borderRadius:11,border:`1px solid ${T.border}`,marginBottom:10}}>
        <div style={{fontSize:11,color:T.textMuted}}>
          <span style={{fontWeight:700,color:T.text}}>{sessionsPerDay===1?"Morning only":"Morning + Evening"}</span>
          <span style={{marginLeft:5,fontSize:10}}>(change when importing)</span>
        </div>
        <button className="btn" onClick={()=>openWardImport("schedule")} style={{padding:"4px 10px",background:T.cream,color:T.primary,fontSize:10,border:`1px solid ${T.primary}30`}}>⚙️ Change</button>
      </div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
        <button className="btn" onClick={prevMonth} style={{padding:"6px 13px",background:T.card,fontSize:13,color:T.text,border:`1px solid ${T.border}`}}>{"‹"} Prev</button>
        <div style={{fontWeight:800,fontSize:14,color:"#166534"}}>{"🏥"} {monthLabel}</div>
        <button className="btn" onClick={nextMonth} style={{padding:"6px 13px",background:T.card,fontSize:13,color:T.text,border:`1px solid ${T.border}`}}>Next {"›"}</button>
      </div>
      <div className="card" style={{padding:10,marginBottom:14}}>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:4}}>
          {["SUN","MON","TUE","WED","THU","FRI","SAT"].map(d=>(<div key={d} style={{textAlign:"center",fontSize:8,fontWeight:700,color:T.textMuted,padding:"3px 0"}}>{d}</div>))}
        </div>
        {weeks.map((week,wi)=>(
          <div key={wi} style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:2}}>
            {week.map((day,di)=>{
              if(!day)return <div key={di}/>;
              const iso=`${wardCalYear}-${String(wardCalMonth+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
              const ward=currentWard(iso),sessions=wardSessionsOnDate(iso);
              const isToday=iso===today,hasWard=sessions.length>0;
              const cpcSessions=sessions.filter(s=>s.label==="CPC"||s.session==="CPC");
              const wardSessions=sessions.filter(s=>s.label!=="CPC"&&s.session!=="CPC");
              const hasCpc=cpcSessions.length>0;
              const cpcStatuses=cpcSessions.map(s=>wardAtt[s.key]).filter(Boolean);
              const cpcAtt=hasCpc&&cpcStatuses.length>0&&cpcStatuses.every(s=>s==="attended");
              const wardStatuses=wardSessions.map(s=>wardAtt[s.key]).filter(Boolean);
              const allAtt=wardSessions.length>0&&wardStatuses.length===wardSessions.length&&wardStatuses.every(s=>s==="attended");
              const hasAtt=wardStatuses.includes("attended");
              const hasMiss=wardStatuses.includes("missed");
              // Partial = mix of attended AND missed (e.g. morning=attended, evening=missed)
              const isPartial=hasAtt&&hasMiss;
              // All missed = only missed statuses marked (none attended)
              const allMissed=hasMiss&&!hasAtt&&wardStatuses.length===wardSessions.length;
              // Use ward rotation color — look up by name if not stored on entry
              const WCLR={"Surgery":"#E63946","Medicine":"#4ECDC4","Paeds Surgery":"#F3722C","Paeds Medicine":"#FF8B5E","Psychiatry":"#9B59B6","Obs & Gynae":"#E84393","Obs & Gyne":"#E84393","Orthopaedics":"#8E44AD","ENT":"#1ABC9C","Ophthalmology":"#2ECC71","Neurosurgery":"#7D6608","Urology":"#117864","Nephrology":"#1A5276","Cardiology":"#A93226","Pulmonology":"#2980B9","Radiology":"#3498DB","Community Medicine":"#27AE60","Forensic Medicine":"#784212","Neurology":"#6C3483","Paediatrics":"#FF8B5E","Surgical":"#E63946","Medical":"#4ECDC4","Paed Emergency":"#F97316","Gynae Emergency":"#E84393","Emergency":"#DC2626","General":"#800020"};
              const wardColor=ward?(ward.color||(()=>{const nm=ward.name;const exact=WCLR[nm];if(exact)return exact;const fuzzy=Object.keys(WCLR).find(k=>nm.toLowerCase().includes(k.toLowerCase())||k.toLowerCase().includes(nm.toLowerCase()));return WCLR[fuzzy]||"#6366F1";})()):"#E5E7EB";
              // Helper: hex #RRGGBB -> rgba(r,g,b,alpha)
              const hexRgba=(hex,a)=>{const h=hex.replace("#","");const r=parseInt(h.slice(0,2),16),g=parseInt(h.slice(2,4),16),b=parseInt(h.slice(4,6),16);return `rgba(${r},${g},${b},${a})`;};
              // Abbreviate ward name: initials for multi-word, first 4 chars for single word
              const wardAbbr=ward?(()=>{const nm=ward.name.trim();const parts=nm.split(" ");return parts.length>1?parts.map(p=>p[0]).join("").toUpperCase().slice(0,5):nm.slice(0,4).toUpperCase();})():"";
              let cellBg=T.white,cellBorder=`1.5px solid ${T.border}`;
              if(wardSessions.length>0){
                if(allAtt){cellBg="rgba(134,239,172,0.45)";cellBorder="2px solid rgba(34,197,94,0.75)";}
                else if(isPartial){cellBg="rgba(253,224,71,0.40)";cellBorder="1.5px solid rgba(234,179,8,0.75)";}
                else if(allMissed){cellBg="rgba(252,165,165,0.50)";cellBorder="1.5px solid rgba(239,68,68,0.70)";}
                else{cellBg=hexRgba(wardColor,0.08);cellBorder=`1.5px solid ${hexRgba(wardColor,0.30)}`;}
              }
              return(
                <div key={di} onClick={()=>setWardDayOpen(iso)}
                  style={{background:cellBg,borderRadius:9,border:isToday?`2px solid ${wardColor}`:cellBorder,cursor:"pointer",minHeight:hasWard?58:40,display:"flex",flexDirection:"column",alignItems:"center",padding:"4px 2px",transition:"background .15s",position:"relative",overflow:"hidden"}}>
                  <span style={{fontSize:10,fontWeight:isToday?800:500,color:isToday?wardColor:T.text}}>{String(day).padStart(2,"0")}</span>
                  {wardSessions.length>0&&<>
                    <div style={{fontSize:6.5,fontWeight:800,color:wardColor,background:hexRgba(wardColor,0.15),borderRadius:3,padding:"1px 3px",marginTop:1,letterSpacing:.4,maxWidth:"95%",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",lineHeight:1.4}}>
                      {wardAbbr}
                    </div>
                    <div style={{display:"flex",gap:2,marginTop:2,justifyContent:"center"}}>
                      {wardSessions.map((s,idx)=>{
                        const st=wardAtt[s.key];
                        const sym=st==="attended"?"✓":st==="missed"?"✗":"·";
                        const col=st==="attended"?wardColor:st==="missed"?"#EF4444":"#9CA3AF";
                        const fw=st==="attended"||st==="missed"?900:600;
                        return <span key={idx} style={{fontSize:10,fontWeight:fw,color:col,lineHeight:1}}>{sym}</span>;
                      })}
                    </div>
                  </>}
                  {hasCpc&&<div style={{position:"absolute",top:2,right:2,width:7,height:7,borderRadius:"50%",background:cpcAtt?"#6C63FF":"#C4B5FD",border:"1px solid #6C63FF"}} title="CPC"/>}
                </div>
              );
            })}
          </div>
        ))}
      </div>
      <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:12,alignItems:"center"}}>
        <span style={{fontSize:9,fontWeight:700,color:T.textMuted,marginRight:2}}>Legend:</span>
        <div style={{display:"flex",alignItems:"center",gap:3,fontSize:9,color:T.textMuted}}>
          <div style={{width:12,height:12,borderRadius:3,background:"rgba(34,197,94,0.18)",border:"2px solid rgba(34,197,94,0.6)"}}/><span>All attended</span>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:3,fontSize:9,color:T.textMuted}}>
          <div style={{width:12,height:12,borderRadius:3,background:"rgba(252,211,77,0.25)",border:"1.5px solid rgba(252,211,77,0.7)"}}/><span>Partial</span>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:3,fontSize:9,color:T.textMuted}}>
          <div style={{width:12,height:12,borderRadius:3,background:"rgba(254,202,202,0.5)",border:"1.5px solid rgba(239,68,68,0.5)"}}/><span>All missed</span>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:3,fontSize:9,color:T.textMuted}}>
          <div style={{width:12,height:12,borderRadius:3,background:"rgba(34,197,94,0.08)",border:"1.5px solid rgba(34,197,94,0.3)"}}/><span>Unmarked</span>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:3,fontSize:9,color:T.textMuted}}>
          <div style={{width:8,height:8,borderRadius:"50%",background:"#6C63FF"}}/><span>CPC</span>
        </div>
      </div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",margin:"0 0 8px"}}>
        <div style={{fontWeight:800,fontSize:14,color:T.text}}>Ward Rotation Schedule</div>

                  <div style={{display:"flex",gap:5,alignItems:"center"}}>
                    {hasActive&&<span className="chip" style={{background:"#DCFCE7",color:"#166534"}}>Active</span>}
                    {allPast&&<span className="chip" style={{background:T.cream,color:T.textMuted}}>Done</span>}
                  </div>
                </div>
                {entries.sort((a,b)=>a.from.localeCompare(b.from)).map((w,i)=>{

function WardDaySheet({date,wardSessionsOnDate,wardAtt,markWard,onEdit,onAddSession,onAddCpc,currentWard,onClose}){
  const sessions=wardSessionsOnDate(date);
  const ward=currentWard(date);
  const d=new Date(date+"T12:00:00");
  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <div>
          <div style={{fontWeight:800,fontSize:20,color:T.text}}>{d.toLocaleDateString("en-IN",{weekday:"long"})}</div>
          <div style={{color:T.textMuted,fontSize:13}}>{dispDate(date)}{ward?` · ${ward.name}`:""}</div>
        </div>
        <div style={{display:"flex",gap:6}}>
          <button className="btn" onClick={()=>onAddCpc(date)} style={{padding:"7px 10px",background:"#6C63FF",color:"#fff",fontSize:12}}>+ CPC</button>
          <button className="btn" onClick={onAddSession} style={{padding:"7px 10px",background:"#22C55E",color:"#fff",fontSize:12}}>+ Add</button>
          <button className="btn" onClick={onClose} style={{padding:"7px 10px",background:T.cream,color:T.textSub,fontSize:12}}>{"✕"}</button>
        </div>
      </div>
      {sessions.length===0
        ?<div style={{textAlign:"center",color:T.textMuted,padding:24}}>No sessions — <button className="btn" onClick={onAddSession} style={{color:"#22C55E",background:"none",textDecoration:"underline",fontSize:14}}>Add one</button></div>
        :sessions.map(s=>{
          const sm=wardAtt[s.key]?STATUS[wardAtt[s.key]]:null;
          return(
            <div key={s.key} className="card" style={{marginBottom:10,overflow:"hidden",borderLeft:"4px solid #22C55E"}}>
              <div style={{padding:"12px 14px",display:"flex",alignItems:"center",gap:10}}>
                <div style={{flex:1}}>
                  <div style={{fontSize:11,fontWeight:700,color:T.textMuted,marginBottom:2}}>{s.label.toUpperCase()}</div>
                  <div style={{fontSize:14,fontWeight:700,color:T.text,marginBottom:3}}>{s.topic||"Ward Round"}</div>
                  {s.teacher&&<div style={{fontSize:12,color:T.textMuted}}>{"👤"} {s.teacher}</div>}
                </div>
                <div style={{display:"flex",gap:6,flexDirection:"column",alignItems:"flex-end"}}>
                  {sm?<span className="chip" style={{background:sm.bg,color:sm.fg,cursor:"pointer"}} onClick={()=>{const k=Object.keys(STATUS);markWard(s.key,k[(k.indexOf(wardAtt[s.key])+1)%k.length]);}}>{sm.icon} {sm.label}</span>
                    :<button className="btn" onClick={()=>markWard(s.key,"attended")} style={{padding:"6px 12px",background:"#22C55E",color:"#fff",fontSize:12}}>Mark {"✓"}</button>}
                  <button className="btn" onClick={()=>onEdit(s)} style={{padding:"4px 9px",background:T.goldPale,color:T.gold,fontSize:10,border:`1px solid ${T.gold}40`}}>{"✏️"} Edit</button>
                </div>
              </div>
            </div>
          );
        })
      }
    </div>
  );
}

function EditWardSessionSheet({session,wardManual,setWardManual,wardHidden,setWardHidden,wardAtt,markWard,onClose,showToast}){
  const[form,setForm]=useState({date:session.date||todayISO(),session:session.session||"Morning",topic:session.topic||"",teacher:session.teacher||""});
  const set=(k,v)=>setForm(p=>({...p,[k]:v}));
  const save=()=>{
    if(session.isNew){
      setWardManual(p=>[...p,{id:Date.now(),...form}]);
    } else if(session.id){
      // Edit existing manual session — update in place
      setWardManual(p=>p.map(m=>m.id===session.id?{...m,...form}:m));
    } else if(session.key){
      // Auto/roster session edited — hide the original key and create a manual override
      // Only hide the specific session key, not siblings
      setWardHidden(p=>p.includes(session.key)?p:[...p,session.key]);
      // Create manual with a new id so it properly overrides
      setWardManual(p=>[...p,{id:Date.now(),...form}]);
    }
    onClose();showToast("Ward session saved");
  };
  const del=()=>{
    if(session.id){
      // Manual session (CPC, Extra etc.) — remove from wardManual
      setWardManual(p=>p.filter(m=>m.id!==session.id));
    } else if(session.key){
      // Auto-generated session (Morning/Evening from schedule) — add key to hidden list
      setWardHidden(p=>p.includes(session.key)?p:[...p,session.key]);
    }
    onClose();showToast("Session removed");
  };
  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <div style={{fontWeight:800,fontSize:17,color:T.text}}>{session.isNew?"+ Add":"✏️ Edit"} Ward Session</div>
        {!session.isNew&&<button className="btn" onClick={del} style={{padding:"6px 12px",background:"#FFE8E8",color:"#EF4444",fontSize:12}}>{"🗑️"}</button>}
      </div>
      <label>Date</label><input type="date" value={form.date} onChange={e=>set("date",e.target.value)}/>
      <label>Session</label>
      <select value={form.session} onChange={e=>set("session",e.target.value)}>
        <option>Morning</option><option>Evening</option><option>CPC</option><option>Extra</option>
      </select>
      <label>Topic / Activity</label>
      <input value={form.topic} onChange={e=>set("topic",e.target.value)} placeholder="e.g. OPD, Bedside Teaching"/>
      <label>Teacher / SR</label>
      <input value={form.teacher} onChange={e=>set("teacher",e.target.value)} placeholder="e.g. Dr. Khan"/>
      <div style={{marginTop:14}}>
        <div style={{fontWeight:700,fontSize:13,marginBottom:8,color:T.text}}>Mark Attendance</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:7}}>
          {Object.entries(STATUS).map(([st,{icon,label,bg,fg,fill}])=>{
            const key=`${form.date}-${form.session.toLowerCase()}`;
            const cur=wardAtt[key];
            return(<button key={st} className="btn" onClick={()=>markWard(key,st)} style={{padding:"11px 6px",background:cur===st?fill:bg,color:cur===st?"#fff":fg,border:`2px solid ${cur===st?fill:fg+"30"}`,fontSize:12,display:"flex",alignItems:"center",justifyContent:"center",gap:6,borderRadius:12}}>{icon} {label}</button>);
          })}
        </div>
      </div>
      <button className="btn" onClick={save} style={{width:"100%",padding:13,background:"#22C55E",color:"#fff",fontSize:14,marginTop:14}}>Save Session</button>
      <button className="btn" onClick={onClose} style={{width:"100%",padding:12,background:T.cream,color:T.textSub,fontSize:13,marginTop:8}}>Cancel</button>
    </div>
  );
}

function WardAttTab({wardSubjectStats,wardStats,target}){
  const ws=wardStats();
  const{wardList:wss,cpcStats}=wardSubjectStats();
  const wPctSched=ws.scheduled>0?pct(ws.attended,ws.scheduled):0;
  return(
    <div className="slide">
      <div className="card" style={{padding:18,marginTop:18,marginBottom:14}}>
        <div style={{display:"flex",gap:14,alignItems:"center",marginBottom:12}}>
          <div style={{position:"relative",width:86,height:86,flexShrink:0}}>
            <Ring value={ws.pct} target={target} size={86} stroke={9} color="#22C55E"/>
            <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
              <div style={{fontSize:20,fontWeight:800,color:ws.pct>=target?"#22C55E":"#EF4444"}}>{ws.pct}%</div>
            </div>
          </div>
          <div style={{flex:1}}>
            <div style={{fontWeight:800,fontSize:16,marginBottom:2,color:T.text}}>Overall Ward Attendance</div>
            <div style={{color:T.textMuted,fontSize:12,marginBottom:6}}>{ws.attended} attended · {ws.total} held · {ws.scheduled} scheduled</div>
          </div>
        </div>
        {/* Option 1 */}
        <div style={{background:T.cream,borderRadius:12,padding:"10px 13px",marginBottom:8}}>
          <div style={{fontSize:11,fontWeight:700,color:T.textMuted,marginBottom:3}}>📌 OF HELD SESSIONS ({ws.pct}%)</div>
          <div style={{fontSize:13,fontWeight:700,color:ws.pct>=target?"#2DB8AB":"#EF4444"}}>
            {ws.pct>=target
              ?`✅ On track — can miss ${canSkip(ws.attended,ws.total,target)} more held`
              :`⚠️ You are currently ${needMore(ws.attended,ws.total,target)} session(s) short of the target for sessions held so far`}
          </div>
        </div>
        {/* Option 2 */}
        <div style={{background:"#F0FDF4",borderRadius:12,padding:"10px 13px"}}>
          <div style={{fontSize:11,fontWeight:700,color:"#166534",marginBottom:3}}>📅 OF ALL SCHEDULED ({wPctSched}%)</div>
          <div style={{fontSize:13,fontWeight:700,color:wPctSched>=target?"#2DB8AB":"#F59E0B"}}>
            {wPctSched>=target
              ?`✅ Safe — can skip ${canSkipFromScheduled(ws.attended,ws.total,ws.scheduled,target)} remaining`
              :needMoreFromScheduled(ws.attended,ws.total,ws.scheduled,target)===Infinity?`🚫 Mathematical impossibility — target ${target}% cannot be reached with remaining sessions`:`⚠️ Must attend ${needMoreFromScheduled(ws.attended,ws.total,ws.scheduled,target)} of ${ws.scheduled-ws.total} remaining`}
          </div>
        </div>
      </div>

      {wss.length===0&&(
        <div className="card" style={{padding:30,textAlign:"center",color:T.textMuted}}>
          <div style={{fontSize:30,marginBottom:7}}>{"🏥"}</div>No ward data yet
        </div>
      )}
      {wss.map(w=>{
        const wsPct2=w.scheduled>0?pct(w.attended,w.scheduled):0;
        const moreHeld=needMore(w.attended,w.total,target);
        const moreSched=needMoreFromScheduled(w.attended,w.total,w.scheduled,target);
        const skipHeld=canSkip(w.attended,w.total,target);
        const skipSched=canSkipFromScheduled(w.attended,w.total,w.scheduled,target);
        return(
        <div key={w.name} className="card" style={{marginBottom:11,overflow:"hidden"}}>
          <div style={{padding:"14px 15px 10px",borderLeft:"4px solid #22C55E"}}>
            <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:8}}>
              <div style={{position:"relative",width:58,height:58,flexShrink:0}}>
                <Ring value={w.pct} target={target} size={58} stroke={6} color="#22C55E"/>
                <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
                  <span style={{fontSize:12,fontWeight:800,color:w.pct>=target?"#22C55E":"#EF4444"}}>{w.pct}%</span>
                </div>
              </div>
              <div style={{flex:1}}>
                <div style={{fontWeight:800,fontSize:14,color:"#166534"}}>{w.name}</div>
                <div style={{fontSize:11,color:T.textMuted}}>{w.attended}/{w.total} held · {w.scheduled} scheduled</div>
                <div style={{fontSize:10,color:T.textMuted,marginTop:2}}>{(w.ranges||[{from:w.from,to:w.to}]).map((r,i)=><span key={i} style={{marginRight:6}}>{dispDate(r.from)}–{dispDate(r.to)}</span>)}</div>
              </div>
            </div>
            {/* Option 1 */}
            <div style={{background:T.cream,borderRadius:10,padding:"7px 11px",marginBottom:6}}>
              <div style={{fontSize:10,fontWeight:700,color:T.textMuted,marginBottom:2}}>📌 OF HELD ({w.pct}%)</div>
              <div style={{fontSize:12,fontWeight:700,color:w.pct>=target?"#2DB8AB":"#EF4444"}}>
                {w.pct>=target?`✅ currently on track`:`⚠️ ${moreHeld} session(s) short of target for held sessions`}
              </div>
            </div>
            {/* Option 2 */}
            <div style={{background:"#F0FDF4",borderRadius:10,padding:"7px 11px"}}>
              <div style={{fontSize:10,fontWeight:700,color:"#166534",marginBottom:2}}>📅 OF SCHEDULED ({wsPct2}%)</div>
              <div style={{fontSize:12,fontWeight:700,color:wsPct2>=target?"#2DB8AB":"#F59E0B"}}>
                {wsPct2>=target?`✅ can skip ${skipSched} remaining`:moreSched===Infinity?`🚫 target unreachable with remaining sessions`:`⚠️ must attend ${moreSched} of ${w.scheduled-w.total} remaining`}
              </div>
            </div>
          </div>
          <div style={{padding:"8px 15px 12px",borderTop:`1px solid ${T.border}`}}>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:T.textMuted,marginBottom:5}}>
              <span>{dispDate((w.ranges||[{from:w.from}])[0].from)}</span>
              <span style={{fontWeight:600,color:"#166534"}}>{(()=>{
                const ranges=w.ranges||[{from:w.from,to:w.to}];
                const start=new Date(ranges[0].from+"T00:00:00"),end=new Date(ranges[ranges.length-1].to+"T23:59:59"),now=new Date();
                if(now<start)return"Not started";
                if(now>end)return"Completed";
                // Elapsed = held sessions / scheduled sessions (not date-based)
                if(w.scheduled===0)return"0% elapsed";
                return`${Math.min(100,Math.round(w.total/w.scheduled*100))}% elapsed (${w.total}/${w.scheduled})`;
              })()}</span>
              <span>{dispDate((w.ranges||[{to:w.to}])[( (w.ranges||[]).length||1 )-1].to)}</span>
            </div>
            <div style={{height:8,background:T.border,borderRadius:4}}>
              <div style={{width:`${w.scheduled===0?0:Math.min(100,Math.round(w.total/w.scheduled*100))}%`,height:"100%",background:"#22C55E",borderRadius:4}}/>
            </div>
          </div>
        </div>
        );
      })}

      {/* ── CPC Section ── */}
      {cpcStats.scheduled>0&&(
        <div style={{marginTop:8}}>
          <div style={{fontWeight:800,fontSize:13,color:"#6C63FF",marginBottom:8,paddingLeft:2}}>🔬 CPC — Clinicopathological Conferences</div>
          <div className="card" style={{marginBottom:11,overflow:"hidden",borderLeft:"4px solid #6C63FF"}}>
            <div style={{padding:"14px 15px 10px"}}>
              <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:8}}>
                <div style={{position:"relative",width:58,height:58,flexShrink:0}}>
                  <Ring value={cpcStats.pct} target={target} size={58} stroke={6} color="#6C63FF"/>
                  <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
                    <span style={{fontSize:12,fontWeight:800,color:cpcStats.pct>=target?"#6C63FF":"#EF4444"}}>{cpcStats.pct}%</span>
                  </div>
                </div>
                <div style={{flex:1}}>
                  <div style={{fontWeight:800,fontSize:14,color:"#6C63FF"}}>CPC</div>
                  <div style={{fontSize:11,color:T.textMuted}}>{cpcStats.attended}/{cpcStats.total} attended · {cpcStats.scheduled} total CPCs</div>
                </div>
              </div>
              <div style={{background:"#F3F0FF",borderRadius:10,padding:"7px 11px",marginBottom:6}}>
                <div style={{fontSize:10,fontWeight:700,color:"#6C63FF",marginBottom:2}}>📌 OF HELD CPCs ({cpcStats.pct}%)</div>
                <div style={{fontSize:12,fontWeight:700,color:cpcStats.pct>=target?"#6C63FF":"#EF4444"}}>
                  {cpcStats.pct>=target
                    ?`✅ On track — ${canSkip(cpcStats.attended,cpcStats.total,target)} can be missed`
                    :`⚠️ ${needMore(cpcStats.attended,cpcStats.total,target)} CPC(s) short of target`}
                </div>
              </div>
              <div style={{background:"#F3F0FF",borderRadius:10,padding:"7px 11px"}}>
                <div style={{fontSize:10,fontWeight:700,color:"#6C63FF",marginBottom:2}}>📅 OF ALL SCHEDULED ({cpcStats.scheduled>0?pct(cpcStats.attended,cpcStats.scheduled):0}%)</div>
                <div style={{fontSize:12,fontWeight:700,color:pct(cpcStats.attended,cpcStats.scheduled)>=target?"#6C63FF":"#F59E0B"}}>
                  {(()=>{const m=needMoreFromScheduled(cpcStats.attended,cpcStats.total,cpcStats.scheduled,target);
                    return pct(cpcStats.attended,cpcStats.scheduled)>=target?`✅ Target met`:m===Infinity?`🚫 Target unreachable`:`⚠️ Must attend ${m} of ${cpcStats.scheduled-cpcStats.total} remaining`;})()}
                </div>
              </div>
            </div>
            <div style={{padding:"8px 15px 12px",borderTop:`1px solid ${T.border}`}}>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:T.textMuted,marginBottom:5}}>
                <span>CPCs held</span>
                <span style={{fontWeight:600,color:"#6C63FF"}}>{cpcStats.scheduled===0?"No CPCs scheduled":`${Math.min(100,Math.round(cpcStats.total/cpcStats.scheduled*100))}% elapsed (${cpcStats.total}/${cpcStats.scheduled})`}</span>
                <span>total</span>
              </div>
              <div style={{height:8,background:T.border,borderRadius:4}}>
                <div style={{width:`${cpcStats.scheduled===0?0:Math.min(100,Math.round(cpcStats.total/cpcStats.scheduled*100))}%`,height:"100%",background:"#6C63FF",borderRadius:4}}/>
              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}
