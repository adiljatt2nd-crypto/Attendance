function ImportSheet({onImport,onClose}){
  const[mode,setMode]=useState("ai");
  const[text,setText]=useState("");
  const[modName,setModName]=useState("");
  const[modFrom,setModFrom]=useState("");
  const[modTo,setModTo]=useState("");
  const AI_PROMPT=`Convert this timetable to CSV with EXACTLY these column headers:\nTopic,Department,Day,Start Time,End Time,Teacher\n\n--- COLUMN RULES ---\n\nTopic\n  The lecture title only. e.g. "Acute Gastritis", "Schizophrenia", "CA Esophagus"\n  NEVER put a disease/condition name in any other column.\n\nDepartment  ← CRITICAL: the app uses this when Teacher code is absent or unclear\n  Pick the closest match from this list (exact spelling):\n  Surgery | General Surgery | Vascular Surgery | Cardiothoracic | Neurosurgery | Plastic Surgery\n  Paeds Surgery | Orthopaedics | Urology\n  Medicine | Paeds Medicine | Psychiatry | Obs & Gynae | Neurology | Cardiology\n  Pulmonology | Nephrology | Gastroenterology | Endocrinology | Haematology\n  Rheumatology | Oncology | Infectious Disease | Dermatology | Anaesthesia\n  Radiology | ENT | Ophthalmology | Community Medicine | Forensic Medicine\n  Pharmacology | Special Pathology | General Pathology | Pathology | Microbiology\n  Anatomy | Physiology | Biochemistry | Pakistan Studies\n\n  Rules:\n  • NEVER write "General" — if unsure, infer from Teacher code prefix (see below) or topic keyword\n  • NEVER write a disease/condition name here (e.g. "Celiac Disease" → wrong; "Medicine" → correct)\n  • If unlisted specialty, write the specialty name e.g. "Sports Medicine", "Geriatrics"\n  • For "Class Assessment" rows: write the department being assessed (e.g. "Surgery") —\n    this is especially important because Teacher code is usually blank for these rows\n\n  Infer department from Teacher code prefix when Department column is unclear:\n  Surg → Surgery | Med / GE → Medicine | PedsSurg / PedSurg → Paeds Surgery\n  Pediatrics / Peds / Paed / Peadiatrics → Paeds Medicine | Psy → Psychiatry\n  Obs / Gyn / Obs&Gyn → Obs & Gynae | Derm → Dermatology | Anaes / Anes → Anaesthesia\n  Ortho → Orthopaedics | Neuro → Neurology | NeuроSurg → Neurosurgery\n  Cardiol → Cardiology | Gastro → Gastroenterology | Haem / Hema → Haematology\n  Endo → Endocrinology | Radiol → Radiology | Urol → Urology\n\nDay\n  Date in YYYY-MM-DD format only. e.g. 2026-05-04\n\nStart Time / End Time\n  24-hour HH:MM format. e.g. 08:00, 08:45, 09:30\n\nTeacher\n  Copy the lecture/faculty code EXACTLY as shown. e.g. Med50/GIT04, Surg43/GIT25\n  Leave blank only if genuinely absent from source.\n\n--- SKIP these rows entirely (do not include in output) ---\n  Holidays | Eid / public holiday | Tentative | Break | End of module | Clinical work | Week recap\n\n--- OUTPUT FORMAT ---\n  CSV only. No markdown, no backticks, no explanation, no extra columns.\n  First line must be the header: Topic,Department,Day,Start Time,End Time,Teacher`;
  return(
    <div>
      <div style={{fontWeight:800,fontSize:18,color:T.text,marginBottom:6}}>{"⬆️"} Import Lecture Timetable</div>
      <label>Module Name *</label>
      <input value={modName} onChange={e=>setModName(e.target.value)} placeholder="e.g. GIT Module 3"/>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginTop:2}}>
        <div><label>Start Date</label><input type="date" value={modFrom} onChange={e=>setModFrom(e.target.value)}/></div>
        <div><label>End Date</label><input type="date" value={modTo} onChange={e=>setModTo(e.target.value)}/></div>
      </div>
      <div style={{display:"flex",gap:7,marginTop:12,marginBottom:12}}>
        {["ai","file","paste"].map(m=>(
          <button key={m} className="btn" onClick={()=>setMode(m)} style={{flex:1,padding:"8px 0",background:mode===m?T.primary:T.cream,color:mode===m?"#fff":T.textSub,fontSize:12,border:mode===m?"none":`1px solid ${T.border}`}}>
            {m==="ai"?"🤖 AI":m==="file"?"📁 File":"✏️ Paste"}
          </button>
        ))}
      </div>
      {mode==="ai"&&(
        <>
          <div style={{fontSize:12,fontWeight:700,color:T.text,marginBottom:6}}>Copy and paste into ChatGPT / Gemini / Claude with your timetable photo or PDF:</div>
          <div style={{background:"#1F2937",color:"#E5E7EB",borderRadius:12,padding:"12px 14px",fontFamily:"monospace",fontSize:10,lineHeight:1.7,marginBottom:8,whiteSpace:"pre-wrap"}}>{AI_PROMPT}</div>
          <button className="btn" onClick={()=>navigator.clipboard?.writeText(AI_PROMPT)} style={{width:"100%",padding:10,background:"#374151",color:"#fff",fontSize:13,marginBottom:12}}>{"📋"} Copy Prompt</button>
          <label>Paste AI-generated CSV below:</label>
          <textarea rows={5} value={text} onChange={e=>setText(e.target.value)} placeholder="Paste CSV output here..." style={{fontFamily:"monospace",fontSize:11}}/>
          <button className="btn" onClick={()=>{if(!modName){alert("Enter a module name first");return;}onImport(text,modName,modFrom||null,modTo||null);}} style={{width:"100%",padding:12,background:T.primary,color:"#fff",fontSize:14,marginTop:8}}>Import</button>
        </>
      )}
      {mode==="file"&&(
        <>
          <div style={{background:T.cream,borderRadius:10,padding:"8px 12px",fontFamily:"monospace",fontSize:10,color:T.text,marginBottom:10,lineHeight:1.8}}>
            Topic,Department,Day,Start Time,End Time,Teacher{"\n"}Acute Gastritis,Medicine,2026-04-28,08:45,09:30,Med50/GIT04
          </div>
          <label style={{display:"block",padding:20,border:`2px dashed ${T.border}`,borderRadius:14,textAlign:"center",cursor:"pointer",color:T.textMuted,fontSize:13}}>
            <div style={{fontSize:26,marginBottom:6}}>{"📂"}</div>Click to upload CSV or TSV
            <input type="file" accept=".csv,.tsv,.txt" style={{display:"none"}} onChange={e=>{const f=e.target.files[0];if(!f)return;if(!modName){alert("Enter module name first");return;}const r=new FileReader();r.onload=ev=>onImport(ev.target.result,modName,modFrom||null,modTo||null);r.readAsText(f);}}/>
          </label>
        </>
      )}
      {mode==="paste"&&(
        <>
          <textarea rows={6} value={text} onChange={e=>setText(e.target.value)} placeholder="Paste CSV/TSV data..." style={{fontFamily:"monospace",fontSize:12}}/>
          <button className="btn" onClick={()=>{if(!modName){alert("Enter module name first");return;}onImport(text,modName,modFrom||null,modTo||null);}} style={{width:"100%",padding:12,background:T.primary,color:"#fff",fontSize:14,marginTop:8}}>Import</button>
        </>
      )}
      <button className="btn" onClick={onClose} style={{width:"100%",padding:12,background:T.cream,color:T.textSub,fontSize:13,marginTop:8}}>Cancel</button>
    </div>
  );
}

// ─── MANAGE MODULES SHEET ─────────────────────────────────────────────────────
function ManageModulesSheet({modules,lectures,moduleStats,target,onDelete,onClose,setImportOpen,setManageModulesOpen}){
  return(
    <div>
      <div style={{fontWeight:800,fontSize:18,color:T.text,marginBottom:4}}>📦 Manage Modules</div>
      <div style={{fontSize:12,color:T.textMuted,marginBottom:14}}>Add or delete entire modules and their lectures</div>
      <button className="btn" onClick={()=>{onClose();setImportOpen(true);}} style={{width:"100%",padding:12,background:T.primary,color:"#fff",fontSize:13,marginBottom:14,display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
        ⬆️ Import New Module
      </button>
      {modules.length===0&&<div style={{textAlign:"center",color:T.textMuted,padding:30,fontSize:13}}>No modules yet. Import a timetable to create one.</div>}
      {modules.map(m=>{
        const st=moduleStats(m.id);
        const lecCount=lectures.filter(l=>l.moduleId===m.id).length;
        return(
          <div key={m.id} className="card" style={{marginBottom:10,padding:"13px 14px",borderLeft:`5px solid ${m.color}`}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <div style={{flex:1}}>
                <div style={{fontWeight:800,fontSize:14,color:T.text}}>{m.name}</div>
                <div style={{fontSize:11,color:T.textMuted,marginTop:2}}>
                  {lecCount} lectures · {st.attended}/{st.total} attended · <span style={{fontWeight:700,color:st.pct>=target?"#2DB8AB":"#EF4444"}}>{st.pct}%</span>
                </div>
                {(m.from||m.to)&&<div style={{fontSize:10,color:T.textMuted,marginTop:1}}>📅 {dispDate(m.from)} → {dispDate(m.to)}</div>}
              </div>
              <button className="btn" onClick={()=>onDelete(m.id)} style={{padding:"6px 11px",background:"#FFE8E8",color:"#EF4444",fontSize:12,border:"1px solid #FECACA"}}>🗑️ Delete</button>
            </div>
          </div>
        );
      })}
      <button className="btn" onClick={onClose} style={{width:"100%",padding:12,background:T.cream,color:T.textSub,fontSize:13,marginTop:8}}>Done</button>
    </div>
  );
}

// ─── MANAGE WARD SCHEDULE SHEET ───────────────────────────────────────────────
function ManageWardSheet({wardSchedule,setWardSchedule,onClose,showToast}){
  const WARD_NAMES=["Surgery","Medicine","Paeds Surgery","Paeds Medicine","Psychiatry","Obs & Gynae","Orthopaedics","ENT","Ophthalmology","Neurosurgery","Urology","Nephrology","Cardiology","Pulmonology","Radiology","Community Medicine","Forensic Medicine","Neurology","General"];
  const WARD_COLORS={"Surgery":"#E63946","Medicine":"#4ECDC4","Paeds Surgery":"#F3722C","Paeds Medicine":"#FF8B5E","Psychiatry":"#9B59B6","Obs & Gynae":"#E84393","Orthopaedics":"#8E44AD","ENT":"#1ABC9C","Ophthalmology":"#2ECC71","Neurosurgery":"#7D6608","Urology":"#117864","Nephrology":"#1A5276","Cardiology":"#A93226","Pulmonology":"#2980B9","Radiology":"#3498DB","Community Medicine":"#27AE60","Forensic Medicine":"#784212","Neurology":"#6C3483","General":"#800020"};
  const blank={name:WARD_NAMES[0],from:"",to:""};
  const[form,setForm]=useState(blank);
  const[editId,setEditId]=useState(null);
  const[confirmDel,setConfirmDel]=useState(null);
  const set=(k,v)=>setForm(p=>({...p,[k]:v}));
  const startEdit=(w)=>{setEditId(w.id);setForm({name:w.name,from:w.from,to:w.to});};
  const cancelEdit=()=>{setEditId(null);setForm(blank);};
  const save=()=>{
    if(!form.name||!form.from||!form.to){showToast("Fill all fields",true);return;}
    if(form.from>form.to){showToast("From date must be before To date",true);return;}
    if(editId!=null){
      setWardSchedule(p=>p.map(w=>w.id===editId?{...w,...form}:w));
      showToast("Rotation updated");
    } else {
      setWardSchedule(p=>[...p,{id:Date.now(),color:WARD_COLORS[form.name]||"#22C55E",...form}]);
      showToast("Rotation added");
    }
    setEditId(null);setForm(blank);
  };
  const del=(id)=>{setWardSchedule(p=>p.filter(w=>w.id!==id));setConfirmDel(null);showToast("Rotation deleted");};
  const groups={};
  wardSchedule.forEach(w=>{if(!groups[w.name])groups[w.name]=[];groups[w.name].push(w);});
  return(
    <div>
      <div style={{fontWeight:800,fontSize:18,color:T.text,marginBottom:4}}>{"🏥"} Manage Ward Schedule</div>
      <div style={{fontSize:12,color:T.textMuted,marginBottom:14}}>Add multiple date ranges per ward — they merge into one attendance card</div>
      <div className="card" style={{padding:"14px 15px",marginBottom:14,border:`1.5px solid ${editId!=null?T.primary:T.border}`}}>
        <div style={{fontWeight:700,fontSize:13,color:editId!=null?T.primary:T.text,marginBottom:10}}>{editId!=null?"✏️ Edit Rotation":"➕ Add New Rotation"}</div>
        <label>Ward / Subject</label>
        <select value={form.name} onChange={e=>set("name",e.target.value)}>
          {WARD_NAMES.map(n=><option key={n} value={n}>{n}</option>)}
        </select>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginTop:2}}>
          <div><label>From Date</label><input type="date" value={form.from} onChange={e=>set("from",e.target.value)}/></div>
          <div><label>To Date</label><input type="date" value={form.to} onChange={e=>set("to",e.target.value)}/></div>
        </div>
        <div style={{display:"flex",gap:8,marginTop:12}}>
          <button className="btn" onClick={save} style={{flex:1,padding:"11px 0",background:T.primary,color:"#fff",fontSize:13}}>{editId!=null?"Save Changes":"Add Rotation"}</button>
          {editId!=null&&<button className="btn" onClick={cancelEdit} style={{padding:"11px 14px",background:T.cream,color:T.textSub,fontSize:13}}>Cancel</button>}
        </div>
      </div>
      {wardSchedule.length===0
        ?<div style={{textAlign:"center",color:T.textMuted,padding:24,fontSize:13}}>No rotations yet. Add one above.</div>
        :Object.entries(groups).map(([name,entries])=>{
          const color=entries[0].color||WARD_COLORS[name]||"#22C55E";
          return(
            <div key={name} className="card" style={{marginBottom:10,overflow:"hidden"}}>
              <div style={{padding:"10px 14px 8px",background:`${color}18`,borderBottom:`1px solid ${color}30`,display:"flex",alignItems:"center",gap:8}}>
                <div style={{width:10,height:10,borderRadius:3,background:color}}/>
                <div style={{fontWeight:800,fontSize:14,color:T.text,flex:1}}>{name}</div>
                <span style={{fontSize:10,color:T.textMuted}}>{entries.length} range{entries.length>1?"s":""}</span>
              </div>
              {entries.sort((a,b)=>a.from.localeCompare(b.from)).map((w,i)=>{
                const todayStr=new Date().toISOString().slice(0,10);
                const isCur=w.from<=todayStr&&w.to>=todayStr,isPast=w.to<todayStr;
                return(
                  <div key={w.id||i} style={{display:"flex",alignItems:"center",gap:8,padding:"10px 14px",borderTop:i>0?`1px solid ${T.border}`:"none"}}>
                    <div style={{flex:1}}>
                      <div style={{fontSize:13,fontWeight:600,color:isCur?"#166534":isPast?T.textMuted:T.text}}>{dispDate(w.from)} {"→"} {dispDate(w.to)}</div>
                      {isCur&&<span className="chip" style={{background:"#DCFCE7",color:"#166534",fontSize:10}}>● Active</span>}
                      {isPast&&<span style={{fontSize:10,color:T.textMuted}}>Completed</span>}
                      {!isCur&&!isPast&&<span style={{fontSize:10,color:"#6C63FF"}}>Upcoming</span>}
                    </div>
                    <button className="btn" onClick={()=>startEdit(w)} style={{padding:"5px 10px",background:T.goldPale,color:T.gold,fontSize:11,border:`1px solid ${T.gold}40`}}>{"✏️"}</button>
                    {confirmDel===w.id
                      ?<div style={{display:"flex",gap:4}}>
                          <button className="btn" onClick={()=>del(w.id)} style={{padding:"5px 9px",background:"#EF4444",color:"#fff",fontSize:11}}>Yes</button>
                          <button className="btn" onClick={()=>setConfirmDel(null)} style={{padding:"5px 9px",background:T.cream,color:T.textSub,fontSize:11}}>No</button>
                        </div>
                      :<button className="btn" onClick={()=>setConfirmDel(w.id)} style={{padding:"5px 10px",background:"#FFE8E8",color:"#EF4444",fontSize:11,border:"1px solid #FECACA"}}>{"🗑️"}</button>
                    }
                  </div>
                );
              })}
            </div>
          );
        })
      }
      <button className="btn" onClick={onClose} style={{width:"100%",padding:12,background:T.cream,color:T.textSub,fontSize:13,marginTop:8}}>Done</button>
    </div>
  );
}


function WardImportSheet({onImportSchedule,onImportRoster,sessionsPerDay,setSessionsPerDay,onClose,initialTab="schedule"}){
  const[subTab,setSubTab]=useState(initialTab);
  const[text,setText]=useState("");
  const SCHED_PROMPT=`Convert ward rotation schedule to CSV:\nWard Subject Name,From Date,To Date\n- Dates in DD-MM-YYYY format\n- One row per rotation period\n- Output CSV only`;
  const ROSTER_PROMPT=`Convert ward timetable/roster to CSV:\nDate,Day,Morning Class Topic,Morning Teacher,Evening Class,SR (Senior Registrar)\n- Date in YYYY-MM-DD format\n- SR = the Senior Registrar who teaches the Evening Class session\n- Leave blank if no session\n- Output CSV only`;
  const prompt=subTab==="schedule"?SCHED_PROMPT:ROSTER_PROMPT;
  return(
    <div>
      <div style={{fontWeight:800,fontSize:18,color:T.text,marginBottom:10}}>{"🏥"} Import Ward Data</div>
      <div style={{display:"flex",gap:7,marginBottom:12}}>
        {["schedule","roster"].map(t=><button key={t} className="btn" onClick={()=>setSubTab(t)} style={{flex:1,padding:"8px 0",background:subTab===t?"#22C55E":T.cream,color:subTab===t?"#fff":T.textSub,fontSize:13,border:subTab===t?"none":`1px solid ${T.border}`}}>{t==="schedule"?"📋 Ward Schedule":"📅 Daily Roster"}</button>)}
      </div>
      <div style={{background:T.cream,borderRadius:11,padding:"11px 13px",marginBottom:12,border:`1px solid ${T.border}`}}>
        <div style={{fontSize:12,fontWeight:700,color:T.textSub,marginBottom:7}}>HOW MANY WARD SESSIONS PER DAY?</div>
        <div style={{display:"flex",gap:8}}>
          {[{n:1,label:"1 session/day",sub:"Morning only"},{n:2,label:"2 sessions/day",sub:"Morning + Evening"}].map(({n,label,sub})=>(
            <button key={n} className="btn" onClick={()=>setSessionsPerDay(n)}
              style={{flex:1,padding:"10px 8px",background:sessionsPerDay===n?"#22C55E":T.white,color:sessionsPerDay===n?"#fff":T.textSub,fontSize:12,border:sessionsPerDay===n?"none":`1.5px solid ${T.border}`,borderRadius:10,textAlign:"center"}}>
              <div style={{fontWeight:700}}>{label}</div>
              <div style={{fontSize:10,opacity:.8,marginTop:2}}>{sub}</div>
            </button>
          ))}
        </div>
      </div>
      <div style={{background:"#1F2937",color:"#E5E7EB",borderRadius:11,padding:"10px 13px",fontFamily:"monospace",fontSize:10,lineHeight:1.7,marginBottom:8,whiteSpace:"pre-wrap"}}>{prompt}</div>
      <button className="btn" onClick={()=>navigator.clipboard?.writeText(prompt)} style={{width:"100%",padding:9,background:"#374151",color:"#fff",fontSize:12,marginBottom:10}}>{"📋"} Copy AI Prompt</button>
      <label style={{display:"block",padding:18,border:`2px dashed ${T.border}`,borderRadius:14,textAlign:"center",cursor:"pointer",color:T.textMuted,fontSize:13}}>
        <div style={{fontSize:24,marginBottom:5}}>{"📂"}</div>Upload {subTab==="schedule"?"Ward Schedule":"Roster"} CSV
        <input type="file" accept=".csv,.tsv,.txt" style={{display:"none"}} onChange={e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{if(subTab==="schedule")onImportSchedule(ev.target.result);else onImportRoster(ev.target.result);};r.readAsText(f);}}/>
      </label>
      <textarea rows={3} value={text} onChange={e=>setText(e.target.value)} placeholder="Or paste CSV here..." style={{fontFamily:"monospace",fontSize:11,marginTop:9}}/>
      {text&&<button className="btn" onClick={()=>{if(subTab==="schedule")onImportSchedule(text);else onImportRoster(text);setText("");}} style={{width:"100%",padding:11,background:"#22C55E",color:"#fff",fontSize:13,marginTop:7}}>Import</button>}
      <button className="btn" onClick={onClose} style={{width:"100%",padding:12,background:T.cream,color:T.textSub,fontSize:13,marginTop:8}}>Done</button>
    </div>
  );
}

// ─── PROFILE SHEET ────────────────────────────────────────────────────────────
function ProfileSheet({profile,setProfile,onClose,showToast}){
  const[form,setForm]=useState({...profile});
  const set=k=>e=>setForm(p=>({...p,[k]:e.target.value}));
  const save=()=>{setProfile(form);showToast("Profile saved ✓");onClose();};
  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <div style={{fontSize:17,fontWeight:800,color:T.text}}>👤 Student Profile</div>
        <button className="btn" onClick={onClose} style={{fontSize:18,background:"none",color:T.textMuted}}>×</button>
      </div>
      <div style={{display:"flex",justifyContent:"center",marginBottom:16}}>
        <div style={{width:72,height:72,borderRadius:"50%",background:`linear-gradient(135deg,${T.primary},${T.gold})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:30,fontWeight:800,color:"#fff",border:`3px solid ${T.gold}`}}>
          {form.name?form.name.trim().charAt(0).toUpperCase():"S"}
        </div>
      </div>
      <label>Full Name</label>
      <input value={form.name} onChange={set("name")} placeholder="e.g. Dr. Ahmed Khan"/>
      <label>Class / Year</label>
      <input value={form.class} onChange={set("class")} placeholder="e.g. 3rd Year MBBS"/>
      <label>Batch</label>
      <input value={form.batch} onChange={set("batch")} placeholder="e.g. 2022–2027"/>
      <label>Registration Number</label>
      <input value={form.regNo} onChange={set("regNo")} placeholder="e.g. 2022-MBBS-0142"/>
      <label>Roll Number</label>
      <input value={form.rollNo} onChange={set("rollNo")} placeholder="e.g. 42"/>
      <label>College / University</label>
      <input value={form.college} onChange={set("college")} placeholder="e.g. King Edward Medical University"/>
      <div style={{display:"flex",gap:8,marginTop:16}}>
        <button className="btn" onClick={onClose} style={{flex:1,padding:12,background:T.cream,color:T.textSub,fontSize:13}}>Cancel</button>
        <button className="btn" onClick={save} style={{flex:2,padding:12,background:T.primary,color:"#fff",fontSize:14,fontWeight:700}}>💾 Save Profile</button>
      </div>
    </div>
  );
}

// ─── EXPORT SHEET ─────────────────────────────────────────────────────────────
function ExportSheet({onExport,onImportOpen,onClose,profile}){
  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <div style={{fontSize:17,fontWeight:800,color:T.text}}>💾 Export & Backup</div>
        <button className="btn" onClick={onClose} style={{fontSize:18,background:"none",color:T.textMuted}}>×</button>
      </div>

      {/* What's included */}
      <div style={{background:T.cream,borderRadius:14,padding:14,marginBottom:16}}>
        <div style={{fontSize:12,fontWeight:700,color:T.textSub,marginBottom:8}}>WHAT'S INCLUDED IN BACKUP</div>
        {["👤 Student profile (name, roll no, reg no, class)","📦 All modules & subjects","📋 Every lecture (topic, date, time, teacher)","✅ All attendance marks (attended/missed/cancelled)","🏥 Ward schedule, roster & manual sessions","📊 All ward attendance records","⚙️ Settings (target %, sessions/day)"].map((item,i)=>(
          <div key={i} style={{display:"flex",alignItems:"center",gap:8,padding:"5px 0",borderTop:i>0?`1px solid ${T.border}`:"none"}}>
            <div style={{fontSize:13}}>{item}</div>
          </div>
        ))}
      </div>

      <button className="btn" onClick={onExport} style={{width:"100%",padding:14,background:T.primary,color:"#fff",fontSize:15,fontWeight:700,marginBottom:10}}>
        ⬇️ Download Full Backup (.json)
      </button>

      <div style={{background:"#EFF6FF",border:"1px solid #BFDBFE",borderRadius:12,padding:12,marginBottom:12,fontSize:12,color:"#1E40AF"}}>
        <strong>💡 Tip:</strong> Save this file safely — it contains your complete data and can be re-imported to restore everything on any device.
      </div>

      <div style={{padding:"12px 0",borderTop:`1px solid ${T.border}`,marginTop:4}}>
        <div style={{fontSize:13,fontWeight:700,color:T.text,marginBottom:8}}>📥 Restore from Backup</div>
        <button className="btn" onClick={onImportOpen} style={{width:"100%",padding:12,background:T.cream,color:T.primary,fontSize:13,fontWeight:700,border:`2px solid ${T.primary}40`}}>
          ⬆️ Import Backup File
        </button>
        <div style={{fontSize:11,color:"#EF4444",marginTop:6,textAlign:"center"}}>⚠️ This will replace ALL current data</div>
      </div>

      <button className="btn" onClick={onClose} style={{width:"100%",padding:12,background:T.cream,color:T.textSub,fontSize:13,marginTop:4}}>Close</button>
    </div>
  );
}

// ─── IMPORT BACKUP SHEET ──────────────────────────────────────────────────────
function ImportBackupSheet({onImport,onClose}){
  const[text,setText]=useState("");
  const[fileName,setFileName]=useState("");
  const handleFile=e=>{
    const f=e.target.files[0];if(!f)return;
    setFileName(f.name);
    const r=new FileReader();
    r.onload=ev=>setText(ev.target.result);
    r.readAsText(f);
  };
  const doImport=()=>{if(text)onImport(text);};
  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <div style={{fontSize:17,fontWeight:800,color:T.text}}>⬆️ Import Backup</div>
        <button className="btn" onClick={onClose} style={{fontSize:18,background:"none",color:T.textMuted}}>×</button>
      </div>
      <div style={{background:"#FEF2F2",border:"1px solid #FECACA",borderRadius:12,padding:12,marginBottom:14,fontSize:12,color:"#991B1B"}}>
        <strong>⚠️ Warning:</strong> Importing a backup will <strong>replace all current data</strong> — modules, lectures, attendance, ward data, and profile. This cannot be undone.
      </div>
      <label style={{display:"block",padding:20,border:`2px dashed ${T.border}`,borderRadius:14,textAlign:"center",cursor:"pointer",color:T.textMuted,fontSize:13,marginBottom:10,background:fileName?T.cream:"transparent"}}>
        {fileName
          ?<><div style={{fontSize:24,marginBottom:4}}>✅</div><div style={{fontWeight:700,color:T.primary}}>{fileName}</div><div style={{fontSize:11,marginTop:3}}>Tap to change file</div></>
          :<><div style={{fontSize:28,marginBottom:5}}>📂</div>Tap to select backup .json file</>
        }
        <input type="file" accept=".json,application/json" style={{display:"none"}} onChange={handleFile}/>
      </label>
      <div style={{fontSize:11,color:T.textMuted,textAlign:"center",marginBottom:12}}>— or paste JSON below —</div>
      <textarea rows={4} value={text} onChange={e=>setText(e.target.value)} placeholder='{"_version":"3.3","profile":{...},...}' style={{fontFamily:"monospace",fontSize:10,marginBottom:10}}/>
      <div style={{display:"flex",gap:8}}>
        <button className="btn" onClick={onClose} style={{flex:1,padding:12,background:T.cream,color:T.textSub,fontSize:13}}>Cancel</button>
        <button className="btn" onClick={doImport} disabled={!text} style={{flex:2,padding:12,background:text?"#EF4444":T.border,color:"#fff",fontSize:14,fontWeight:700}}>
          ⬆️ Restore Backup
        </button>
      </div>
    </div>
  );
}

root.render(React.createElement(App));
</script>
