const { useState, useCallback, useEffect } = React;


// ─── THEME ────────────────────────────────────────────────────────────────────
const T = {

// ─── KNOWN DEPARTMENTS ────────────────────────────────────────────────────────
// Order matters: more specific entries (e.g. Paeds Surgery) must come BEFORE general ones (Surgery)
// Keys are tested against EACH slash-segment of the teacher code separately, AND against the full string.
// Use ^ prefix anchors for code-prefix matching (e.g. "^pedssurg", "^surg") to avoid false positives.
const KNOWN_DEPTS = [
  { name:"Paeds Surgery",       color:"#F3722C", keys:["^pedssurg","^paedssurg","^pedsurg","^pedsurg","paeds surg","peds surg","paediatric surg","pediatric surg","paed.*surg","peds.*surg","^pedsur","^paedsur","^peds surg"] },
  { name:"Paeds Medicine",      color:"#FF8B5E", keys:["^pediatrics","^paediatrics","^peadiatrics","^peds$","^paed$","^peads","paediatric med","pediatric med","paeds med","peds med"] },
  { name:"Neurosurgery",        color:"#7D6608", keys:["^neurosurg","neurosurg"] },
  { name:"Plastic Surgery",     color:"#C0392B", keys:["^plastic","plastic"] },
  { name:"Surgery",             color:"#E63946", keys:["^surg","surgical"] },
  { name:"Medicine",            color:"#4ECDC4", keys:["^med","^ge$","\\bge\\b","\\bim\\b","internal med"] },
  { name:"Psychiatry",          color:"#9B59B6", keys:["^psy","psychiatr"] },
  { name:"Obs & Gynae",         color:"#E84393", keys:["^obs","\\bgyn\\b","obstetric","ob/gyn","obs&gyn"] },

  { name:"Community Medicine",  color:"#27AE60", keys:["^community","^cmed","comm med","preventive","community med"] },
  { name:"Pharmacology",        color:"#D35400", keys:["^pharmac","pharmac"] },
  { name:"Special Pathology",   color:"#922B21", keys:["special path","sp path","spl path","spcl path"] },
  { name:"General Pathology",   color:"#7B241C", keys:["gen path","general path","^genpath","pathol"] },
  { name:"Pakistan Studies",    color:"#117A65", keys:["pak stud","pakistan stud","^pakstud","^pst$"] },
  { name:"Anatomy",             color:"#5D6D7E", keys:["^anat","anat"] },
  { name:"Physiology",          color:"#2E86C1", keys:["^physiol","physiol"] },
  { name:"Biochemistry",        color:"#1E8449", keys:["^biochem","biochem"] },
  { name:"Forensic Medicine",   color:"#784212", keys:["^forensic","forensic"] },
  { name:"Neurology",           color:"#6C3483", keys:["^neurol","neuro med"] },
  { name:"Urology",             color:"#117864", keys:["^urol","urol"] },
  { name:"Nephrology",          color:"#1A5276", keys:["^nephrol","nephrol"] },
  { name:"Cardiology",          color:"#A93226", keys:["^cardiol","cardiol","cardiac"] },
  { name:"Pulmonology",         color:"#2980B9", keys:["^pulmon","pulmon","respirat","chest"] },
  { name:"Dermatology",          color:"#E91E63", keys:["^derm","^derma$","dermatol","^skin$","^derm$"] },
  { name:"Anaesthesia",          color:"#607D8B", keys:["^anaes","^anes","anaesth","anesthes","^anes$","^anaes$"] },
  { name:"Haematology",          color:"#B71C1C", keys:["^haem","^hema","haematol","hematol"] },
  { name:"Endocrinology",        color:"#FF6F00", keys:["^endocrin","endocrin","^endo$"] },
  { name:"Gastroenterology",     color:"#00695C", keys:["^gastro","gastroenter","^git$","\bgit\b"] },
  { name:"Rheumatology",         color:"#AD1457", keys:["^rheum","rheumatol"] },
  { name:"Oncology",             color:"#4A148C", keys:["^oncol","oncol"] },
  { name:"Infectious Disease",   color:"#1B5E20", keys:["^infect","infect dis","^id$"] },
  { name:"General Surgery",      color:"#C62828", keys:["^gen surg","general surg","^gensurg"] },
  { name:"Vascular Surgery",     color:"#880E4F", keys:["^vascular","vasc surg"] },
  { name:"Cardiothoracic",       color:"#B71C1C", keys:["^cardiothor","cardiothorac","^cts$"] },
  { name:"Pathology",            color:"#6D4C41", keys:["^path","pathol"] },
  { name:"Microbiology",         color:"#33691E", keys:["^micro","microbiol"] },
  { name:"General",             color:"#800020", keys:[] },
];

// Test a single cleaned segment (no slashes) against dept keys
function matchSegment(seg, dept) {
  const s = seg.trim().toLowerCase();
  if (!s) return false;
  for (const k of dept.keys)
    if (new RegExp(k, "i").test(s)) return true;
  return false;
}

// Generate a stable color from a string (for auto-detected unknown subjects)
function strColor(str) {
  let h = 0;
  for (let i = 0; i < str.length; i++) h = (h * 31 + str.charCodeAt(i)) & 0xFFFFFF;
  // Keep saturation high, avoid very dark/light
  const hue = Math.abs(h) % 360;
  return `hsl(${hue},65%,42%)`;
}

// Title-case a string
function toTitleCase(s) {
  return s.replace(/\w\S*/g, w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase());
}

function detectDept(raw) {
  const c = cleanText(raw || "").toLowerCase();
  if (!c || c === "n/a") return KNOWN_DEPTS[KNOWN_DEPTS.length - 1];
  // Split by "/" and "-" to get individual code segments (e.g. "Surg32", "GIT03", "PedsSurg02")
  const segments = c.split(/[\/\-]/).map(s => s.trim()).filter(Boolean);
  for (const d of KNOWN_DEPTS) {
    // Test full string first
    for (const k of d.keys)
      if (new RegExp(k, "i").test(c)) return d;
    // Then test each segment individually (catches "Med48", "Surg32", "PedsSurg02")
    for (const seg of segments)
      if (matchSegment(seg, d)) return d;
  }
  // Unknown subject — only create a dynamic subject if string looks like a dept/specialty name,
  // NOT a disease/condition/topic (which means the AI put a topic in the Department column).
  const stripped = c.replace(/\d+$/, "").replace(/[_\-\/]/g," ").replace(/[()]/g,"").trim();
  if (stripped && stripped.length > 1) {
    // Reject time-like strings e.g. "09:", "08:", "08:45", "9:30"
    if (/^\d{1,2}:/.test(stripped)) return KNOWN_DEPTS[KNOWN_DEPTS.length - 1];
    // Reject pure number strings e.g. "22", "07"
    if (/^\d+$/.test(stripped)) return KNOWN_DEPTS[KNOWN_DEPTS.length - 1];
    // Reject very short codes that are just GIT/module codes e.g. "git07", "git"
    if (/^git\d*$/i.test(stripped)) return KNOWN_DEPTS[KNOWN_DEPTS.length - 1];
    // Also reject "gi t" (GIT with space), "gi t30" stripped to "gi t" etc.
    if (/^gi\s*t$/i.test(stripped)) return KNOWN_DEPTS[KNOWN_DEPTS.length - 1];
    // Reject single/double char remnants like "t", "gi", "md" etc.
    if (stripped.replace(/\s/g,"").length <= 2) return KNOWN_DEPTS[KNOWN_DEPTS.length - 1];
    // Heuristic: topic names tend to be multi-word AND contain disease/procedure keywords.
    // Dept names are usually 1-2 words and don't contain these patterns.
    const looksLikeTopic = (
      // Contains disease/condition/procedure keywords
      /\b(disease|syndrome|deficiency|disorder|failure|cancer|carcinoma|peritonei|fever|palsy|injury|infection|poisoning|toxicity|anaemia|anemia|diabetes|hypertension|malaria|tuberculosis|hepatitis|appendicitis|cholera|typhoid|dengue|vitamin|celiac|coeliac|peritonitis|abscess|fracture|dislocation|hernia|calculus|stones|obstruction|perforation|hemorrhage|haemorrhage|ischemia|ischaemia|infarction|embolism|thrombosis|stenosis|atresia|fistula|polyp|cyst|tumour|tumor|lymphoma|leukemia|leukaemia|myopathy|neuropathy|nephropathy|retinopathy|coagulopathy|encephalopathy|gastropathy)\b/i.test(stripped)
      // OR has 3+ words (depts are rarely 3+ words except known ones already in list)
      || stripped.split(/\s+/).length >= 3
    );
    if (!looksLikeTopic) {
      const title = toTitleCase(stripped);
      return { name: title, color: strColor(title), keys: [], _dynamic: true };
    }
  }
  return KNOWN_DEPTS[KNOWN_DEPTS.length - 1];
}

// ─── UTILS ────────────────────────────────────────────────────────────────────
function cleanText(s) {
  if (!s) return "";
  return s.replace(/\[span_\d+\]\((start|end)_span\)/gi,"")
    .replace(/\[span_\d+\]/gi,"").replace(/\(start_span\)|\(end_span\)/gi,"")
    .replace(/\s{2,}/g," ").trim();
}
const todayISO = () => new Date().toISOString().slice(0,10);
const tomorrowISO = () => { const d=new Date(); d.setDate(d.getDate()+1); return d.toISOString().slice(0,10); };
const dispDate = iso => { if(!iso)return""; const[y,m,d]=iso.split("-"); return`${d}/${m}/${y}`; };
const pct = (a,t) => t===0?0:Math.round(a/t*100);
const fmt12 = t => { if(!t)return"—"; const[h,m]=t.split(":").map(Number); return`${h>12?h-12:h||12}:${String(m).padStart(2,"0")} ${h>=12?"PM":"AM"}`; };
const t2m = t => { if(!t)return 0; const[h,m]=t.split(":").map(Number); return h*60+m; };
const isPast = iso => iso && iso <= todayISO();

function xlFrac(raw) {
  if(!raw||raw==="N/A")return null;
  const s=String(raw).trim();
  if(/^\d{1,2}:\d{2}$/.test(s))return s.length===4?"0"+s:s;
  const n=parseFloat(s);
  if(!isNaN(n)&&n>0&&n<1){const m=Math.round(n*24*60);return`${String(Math.floor(m/60)).padStart(2,"0")}:${String(m%60).padStart(2,"0")}`;}
  return null;
}
function xlSerial(n){const d=new Date(1899,11,30);d.setDate(d.getDate()+Math.round(Number(n)));return d.toISOString().slice(0,10);}
function parseDate(raw){
  if(!raw)return null;const s=String(raw).trim().replace(/\./g,"-");
  if(/^\d+$/.test(s)&&Number(s)>40000)return xlSerial(Number(s));
  if(/^\d{4}-\d{2}-\d{2}$/.test(s))return s;
  const m=s.match(/(\d{2})[-\/](\d{2})[-\/](\d{4})/);if(m)return`${m[3]}-${m[2]}-${m[1]}`;
  const f=parseFloat(s);if(!isNaN(f)&&f>40000)return xlSerial(f);
  return null;
}
// Option 1: Current deficit vs held classes — how many held classes short of target right now
// Returns { deficit, onTrack } — deficit = how many classes behind vs expected for held so far
function needMore(attended, held, tgt){
  if(held===0)return 0;
  const expected=Math.ceil(tgt/100*held);
  return Math.max(0,expected-attended);
}
function canSkip(attended, held, tgt){
  return Math.max(0,Math.floor(attended/(tgt/100)-held));
}
// Option 2: How many of REMAINING (scheduled - held) must be attended to hit target% of ALL scheduled
// Returns a number, or Infinity if mathematically impossible
function needMoreFromScheduled(attended, held, scheduled, tgt){
  if(scheduled<=0)return 0;
  const needed=Math.ceil(tgt/100*scheduled);
  const mustAttend=Math.max(0,needed-attended);
  const remaining=scheduled-held;
  if(mustAttend<=0)return 0;
  if(mustAttend>remaining)return Infinity; // impossible
  return mustAttend;
}
function canSkipFromScheduled(attended, held, scheduled, tgt){
  if(scheduled<=0)return 0;
  const remaining=scheduled-held;
  const needed=Math.ceil(tgt/100*scheduled);
  const mustAttend=Math.max(0,needed-attended);
  return Math.max(0,remaining-mustAttend);
}

// ─── CSV PARSERS ──────────────────────────────────────────────────────────────
function parseLectureCSV(raw){
  const cleaned=raw.replace(/\[span_\d+\]\((start|end)_span\)/gi,"").replace(/\[span_\d+\]/gi,"");
  const lines=cleaned.split(/\r?\n/).filter(Boolean);
  if(lines.length<2)return[];
  const sep=lines[0].split("\t").length>=lines[0].split(",").length?"\t":",";
  const strip=s=>s.trim().replace(/^["']|["']$/g,"");
  const hdrs=lines[0].split(sep).map(strip).map(h=>h.toLowerCase());
  const fc=(...ks)=>hdrs.findIndex(h=>ks.some(k=>h.includes(k)));
  const iS=fc("topic","subject","lecture","name"),iD=fc("day","date"),
    iSt=fc("start time","start","begin"),
    iE=fc("end time","finish","end"),  // removed "to" — it matches "topic"
    iC=fc("teacher","faculty","code","instructor"),
    iDept=fc("department","dept");
  const rows=[];
  lines.slice(1).forEach(line=>{
    const cells=line.split(sep).map(strip);
    const topic=cleanText(iS>=0?cells[iS]||"":cells[0]||"");
    if(!topic)return;
    if(/^(holiday|tentative|eid|break|end of|clinical|week\s|day\s*\d)/i.test(topic))return;
    const dayRaw=iD>=0?cells[iD]||"":"",startRaw=iSt>=0?cells[iSt]||"":"",
      endRaw=iE>=0?cells[iE]||"":"",codeRaw=cleanText(iC>=0?cells[iC]||"":"");
    const deptRaw=cleanText(iDept>=0?cells[iDept]||"":"");
    const isAssessment=/class\s*assessment/i.test(topic);
    // Priority: 1) explicit Department column from AI (only if it resolves to a known dept)
    //           2) Teacher code  3) topic text
    // If AI's Department column returns General/dynamic AND codeRaw is available, prefer codeRaw
    let dept;
    if(deptRaw){
      const dFromDept=detectDept(deptRaw);
      // If it matched a real known dept (not General and not dynamic), use it
      if(dFromDept.name!=="General"&&!dFromDept._dynamic){
        dept=dFromDept;
      } else {
        // AI gave us something unrecognised in Dept column — try teacher code first, then topic
        dept=detectDept(codeRaw||topic);
      }
    } else {
      dept=detectDept(codeRaw||topic);
    }
    rows.push({topic:cleanText(topic),dept,code:codeRaw,date:parseDate(dayRaw),start:xlFrac(startRaw),end:xlFrac(endRaw),isAssessment});
  });
  return rows;
}

function parseWardScheduleCSV(raw){
  const lines=raw.trim().split(/\r?\n/).filter(Boolean);
  if(lines.length<2)return[];
  const sep=lines[0].includes("\t")?"\t":",";
  const strip=s=>s.trim().replace(/^["']|["']$/g,"").replace(/\./g,"-");
  const rows=[];
  lines.slice(1).forEach(line=>{
    const cells=line.split(sep).map(strip);
    if(cells.length<3)return;
    const name=cells[0].trim(),from=parseDate(cells[1]),to=parseDate(cells[2]);
    if(name&&from&&to)rows.push({name,from,to});
  });
  return rows;
}

function parseWardRosterCSV(raw){
  const lines=raw.trim().split(/\r?\n/).filter(Boolean);
  if(lines.length<2)return[];
  const sep=lines[0].includes("\t")?"\t":",";
  const strip=s=>s.trim().replace(/^["']|["']$/g,"");
  const hdrs=lines[0].split(sep).map(strip).map(h=>h.toLowerCase());
  const fc=(...ks)=>hdrs.findIndex(h=>ks.some(k=>h.includes(k)));
  const iDate=fc("date"),iMorn=fc("morning class","morning topic","morning"),
    iMornT=fc("morning teacher"),iEve=fc("evening class","evening"),iEveT=fc("senior registrar","evening teacher");
  const rows=[];
  lines.slice(1).forEach(line=>{
    const cells=line.split(sep).map(strip);
    const date=parseDate(iDate>=0?cells[iDate]||"":cells[0]||"");
    if(!date)return;
    rows.push({date,morning:cleanText(iMorn>=0?cells[iMorn]||"":""),
      morningTeacher:cleanText(iMornT>=0?cells[iMornT]||"":""),
      evening:cleanText(iEve>=0?cells[iEve]||"":""),
      eveningTeacher:cleanText(iEveT>=0?cells[iEveT]||"":"")});
  });
  return rows;
}

function buildLectures(rows,moduleId,existingSubs=[]){
  const map={};existingSubs.forEach(s=>{map[s.name]=s;});
  let nsi=existingSubs.length?Math.max(...existingSubs.map(s=>s.id))+1:1,nli=Date.now();
  const subjects=[...existingSubs],lectures=[];
  rows.forEach(r=>{
    const{name:dn,color:dc}=r.dept;
    // Final guard: skip subjects whose name looks like a time or module code,
    // OR whose dept resolved to "General" (= undetected / ambiguous) — user will manually assign
    const isGarbageName=/^\d{1,2}:|^\d+$|^git\d*$/i.test(dn)||/^gi\s*t/i.test(dn)||(dn.replace(/\s/g,"").length<=2);
    const isUndetected=isGarbageName||dn==="General";
    if(isUndetected){
      // Cannot detect subject — store with subjectId=null and _unassigned=true
      // These appear in the "Unassigned Lectures" card for manual reassignment
      lectures.push({id:nli++,subjectId:null,moduleId,topic:r.topic,code:r.code,date:r.date,start:r.start,end:r.end,isAssessment:!!r.isAssessment,_unassigned:true});
      return;
    }
    if(!map[dn]){const s={id:nsi++,name:dn,color:dc,_dynamic:!!r.dept._dynamic};map[dn]=s;subjects.push(s);}
    lectures.push({id:nli++,subjectId:map[dn].id,moduleId,topic:r.topic,code:r.code,
      date:r.date,start:r.start,end:r.end,isAssessment:!!r.isAssessment});
  });
  // Prune dynamic subjects that have 0 lectures (they were created from bad dept data)
  const usedIds=new Set(lectures.map(l=>l.subjectId));
  const prunedSubjects=subjects.filter(s=>!s._dynamic||usedIds.has(s.id));
  return{subjects:prunedSubjects,lectures};
}

// ─── RING ─────────────────────────────────────────────────────────────────────
function Ring({value,target,size=80,stroke=8,color=T.primary}){
  const r=(size-stroke)/2,circ=2*Math.PI*r,dash=Math.min(Math.max(value,0),100)/100*circ;
  return(<svg width={size} height={size} style={{transform:"rotate(-90deg)"}}>
    <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={T.border} strokeWidth={stroke}/>
    <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={value>=target?color:"#EF4444"}
      strokeWidth={stroke} strokeDasharray={`${dash} ${circ}`} strokeLinecap="round"
      style={{transition:"stroke-dasharray .6s ease"}}/>
  </svg>);
}

// ─── STATUS ───────────────────────────────────────────────────────────────────
const STATUS={
  attended: {icon:"✅",label:"Attended", bg:"#E6FAF8",fg:"#2DB8AB",fill:"#22C55E"},
  missed:   {icon:"❌",label:"Missed",   bg:"#FFE8E8",fg:"#EF4444",fill:"#EF4444"},
  cancelled:{icon:"🚫",label:"Cancelled",bg:"#F3F4F6",fg:"#6B7280",fill:"#374151"},
  holiday:  {icon:"🏖️",label:"Holiday",  bg:"#FFFBEB",fg:"#D97706",fill:"#F59E0B"},
};

// ─── ROOT ─────────────────────────────────────────────────────────────────────
function App(){
  const[modules,setModules]=useState([]);
  const[subjects,setSubjects]=useState([]);
  const[lectures,setLectures]=useState([]);
  // Migration: fix any previously imported lectures that got wrong subjectId via garbage detection
  useEffect(()=>{
    setLectures(prev=>{
      const needsFix=prev.some(l=>l._unassigned&&l.subjectId!=null);
      if(!needsFix)return prev;
      return prev.map(l=>l._unassigned&&l.subjectId!=null?{...l,subjectId:null}:l);
    });
  },[]);
  // ── localStorage persistence ──────────────────────────────────────────────
  useEffect(()=>{
    try{
      const d=JSON.parse(localStorage.getItem('mlt_data')||'{}');
      if(d.modules)setModules(d.modules);
      if(d.subjects)setSubjects(d.subjects);
      if(d.lectures)setLectures(d.lectures);
      if(d.att)setAtt(d.att);
      if(d.wardSchedule)setWardSchedule(d.wardSchedule);
      if(d.wardRoster)setWardRoster(d.wardRoster);
      if(d.wardManual)setWardManual(d.wardManual);
      if(d.wardHidden)setWardHidden(d.wardHidden);
      if(d.wardAtt)setWardAtt(d.wardAtt);
      if(typeof d.sessionsPerDay==='number')setSessionsPerDay(d.sessionsPerDay);
      if(typeof d.target==='number')setTarget(d.target);
      if(d.profile)setProfile(d.profile);
    }catch(e){}
  },[]);

  useEffect(()=>{
    try{
      localStorage.setItem('mlt_data',JSON.stringify({
        modules,subjects,lectures,att,
        wardSchedule,wardRoster,wardManual,wardHidden,wardAtt,
        sessionsPerDay,target,profile
      }));
    }catch(e){}
  },[modules,subjects,lectures,att,wardSchedule,wardRoster,wardManual,wardHidden,wardAtt,sessionsPerDay,target,profile]);

  const[att,setAtt]=useState({});
  const[wardSchedule,setWardSchedule]=useState([]);
  const[wardRoster,setWardRoster]=useState([]);
  const[wardManual,setWardManual]=useState([]); // manually added ward sessions {id,date,session,topic,teacher}
  const[wardHidden,setWardHidden]=useState([]); // keys of auto sessions explicitly removed by user
  const[wardAtt,setWardAtt]=useState({});
  const[sessionsPerDay,setSessionsPerDay]=useState(2);
  const[target,setTarget]=useState(75);
  const[tab,setTab]=useState("upcoming");

  // ── Student Profile ───────────────────────────────────────────────────────
  const[profile,setProfile]=useState({name:"",class:"",regNo:"",rollNo:"",college:"",batch:""});
  const[profileOpen,setProfileOpen]=useState(false);
  const[exportOpen,setExportOpen]=useState(false);
  const[importBackupOpen,setImportBackupOpen]=useState(false);

  const now=new Date();
  const[calYear,setCalYear]=useState(now.getFullYear());
  const[calMonth,setCalMonth]=useState(now.getMonth());
  const[wardCalYear,setWardCalYear]=useState(now.getFullYear());
  const[wardCalMonth,setWardCalMonth]=useState(now.getMonth());

  const[dayOpen,setDayOpen]=useState(null);
  const[wardDayOpen,setWardDayOpen]=useState(null);
  const[lecOpen,setLecOpen]=useState(null);
  const[editLecOpen,setEditLecOpen]=useState(null);
  const[addLecDate,setAddLecDate]=useState(null);
  const[importOpen,setImportOpen]=useState(false);
  const[wardImportOpen,setWardImportOpen]=useState(false);
  const[wardImportTab,setWardImportTab]=useState("schedule");
  const openWardImport=(tab="schedule")=>{setWardImportTab(tab);setWardImportOpen(true);};
  const[editSubOpen,setEditSubOpen]=useState(null);
  const[addSubOpen,setAddSubOpen]=useState(false);
  const[editWardSession,setEditWardSession]=useState(null); // {date,session}
  const[manageModulesOpen,setManageModulesOpen]=useState(false);
  const[manageWardOpen,setManageWardOpen]=useState(false);
  const[editWardScheduleEntry,setEditWardScheduleEntry]=useState(null); // {id,name,from,to} or null for add
  const[toast,setToast]=useState(null);

  const showToast=(msg,err=false)=>{setToast({msg,err});setTimeout(()=>setToast(null),2800);};

  // ── Helpers ───────────────────────────────────────────────────────────────
  const heldLecs=useCallback(lecs=>lecs.filter(l=>l.date&&isPast(l.date)&&!l._unassigned),[]);
  const lecsOnDate=useCallback(iso=>lectures.filter(l=>l.date===iso).sort((a,b)=>t2m(a.start)-t2m(b.start)),[lectures]);
  const currentWard=useCallback(iso=>wardSchedule.find(w=>w.from<=iso&&w.to>=iso)||null,[wardSchedule]);
  const rosterForDate=useCallback(iso=>wardRoster.find(r=>r.date===iso)||null,[wardRoster]);

  // Get ward sessions for a date (roster + manual)
  const wardSessionsOnDate=useCallback(iso=>{
    // Sundays are off — no auto/roster sessions (manual sessions like CPC can still be added)
    const dayOfWeek=new Date(iso+"T12:00:00").getDay(); // 0=Sunday
    const isSunday=dayOfWeek===0;
    const roster=wardRoster.find(r=>r.date===iso);
    const manual=wardManual.filter(w=>w.date===iso);
    const sessions=[];
    if(!isSunday){
      if(roster){
        if(roster.morning||sessionsPerDay>=1) sessions.push({key:`${iso}-morning`,label:"Morning",topic:roster.morning||"Ward Round",teacher:roster.morningTeacher,source:"roster"});
        if(sessionsPerDay>=2&&(roster.evening)) sessions.push({key:`${iso}-evening`,label:"Evening",topic:roster.evening||"Ward Round",teacher:roster.eveningTeacher,source:"roster"});
      } else {
        const ward=currentWard(iso);
        if(ward){
          sessions.push({key:`${iso}-morning`,label:"Morning",topic:"Ward Round",teacher:ward.name,source:"auto"});
          if(sessionsPerDay>=2) sessions.push({key:`${iso}-evening`,label:"Evening",topic:"Ward Round",teacher:ward.name,source:"auto"});
        }
      }
    }
    // Filter out sessions explicitly deleted/hidden by user FIRST
    const visibleSessions=sessions.filter(s=>!wardHidden.includes(s.key));
    // Manual sessions (CPC, extra etc.) always shown — override auto/roster sessions with same label
    manual.forEach(m=>{
      const key=`${iso}-${m.session}`;
      // Replace existing auto/roster session with same label, or add if not present
      const existingIdx=visibleSessions.findIndex(s=>s.label===m.session);
      const manualEntry={key,label:m.session,topic:m.topic,teacher:m.teacher,source:"manual",id:m.id};
      if(existingIdx>=0){visibleSessions[existingIdx]=manualEntry;}
      else{visibleSessions.push(manualEntry);}
    });
    return visibleSessions;
  },[wardRoster,wardManual,wardSchedule,sessionsPerDay,currentWard,wardHidden]);

  // ── Stats ─────────────────────────────────────────────────────────────────
  const subStats=useCallback((subId,modId=null)=>{
    let lecs=heldLecs(lectures.filter(l=>l.subjectId===subId));
    if(modId)lecs=lecs.filter(l=>l.moduleId===modId);
    const cnt=lecs.filter(l=>att[l.id]!=="cancelled"&&att[l.id]!=="holiday");
    const atd=cnt.filter(l=>att[l.id]==="attended").length;
    // Cancelled/holiday lectures are removed from scheduled count too
    const scheduled=lectures.filter(l=>l.subjectId===subId
      &&!l._unassigned&&l.subjectId!=null
      &&(modId?l.moduleId===modId:true)
      &&att[l.id]!=="cancelled"&&att[l.id]!=="holiday").length;
    return{total:cnt.length,attended:atd,pct:pct(atd,cnt.length),scheduled};
  },[lectures,att,heldLecs]);

  const moduleStats=useCallback(mid=>{
    const lecs=heldLecs(lectures.filter(l=>l.moduleId===mid));
    const cnt=lecs.filter(l=>att[l.id]!=="cancelled"&&att[l.id]!=="holiday");
    const atd=cnt.filter(l=>att[l.id]==="attended").length;
    return{total:cnt.length,attended:atd,pct:pct(atd,cnt.length)};
  },[lectures,att,heldLecs]);

  const overall=useCallback(()=>{
    const lecs=heldLecs(lectures.filter(l=>l.subjectId!=null));
    const cnt=lecs.filter(l=>att[l.id]!=="cancelled"&&att[l.id]!=="holiday");
    const atd=cnt.filter(l=>att[l.id]==="attended").length;
    return{total:cnt.length,attended:atd,pct:pct(atd,cnt.length)};
  },[lectures,att,heldLecs]);

  const wardStats=useCallback(()=>{
    let total=0,attended=0,scheduled=0;const today=todayISO();
    wardSchedule.forEach(w=>{
      // scheduled = all sessions in the rotation (past + future)
      let ds=new Date(w.from+"T12:00:00");const endAll=new Date(w.to+"T12:00:00");
      while(ds<=endAll){scheduled+=wardSessionsOnDate(ds.toISOString().slice(0,10)).length;ds.setDate(ds.getDate()+1);}
      // held = sessions up to today
      let d=new Date(w.from+"T12:00:00");const end=new Date(w.to+"T12:00:00"),td=new Date(today+"T12:00:00");
      while(d<=end&&d<=td){
        const iso=d.toISOString().slice(0,10);
        const sessions=wardSessionsOnDate(iso);
        sessions.forEach(s=>{total++;if(wardAtt[s.key]==="attended")attended++;});
        d.setDate(d.getDate()+1);
      }
    });
    return{total,attended,scheduled,pct:pct(attended,total)};
  },[wardSchedule,wardSessionsOnDate,wardAtt]);

  const wardSubjectStats=useCallback(()=>{
    const map={};const today=todayISO();
    wardSchedule.forEach(w=>{
      if(!map[w.name])map[w.name]={total:0,attended:0,scheduled:0,ranges:[],isCpc:false};
      map[w.name].ranges.push({from:w.from,to:w.to});
      // scheduled = non-CPC sessions only
      let ds=new Date(w.from+"T12:00:00");const endAll=new Date(w.to+"T12:00:00");
      while(ds<=endAll){
        const iso=ds.toISOString().slice(0,10);
        wardSessionsOnDate(iso).filter(s=>s.label!=="CPC"&&s.session!=="CPC").forEach(()=>map[w.name].scheduled++);
        ds.setDate(ds.getDate()+1);
      }
      // held = non-CPC sessions up to today
      let d=new Date(w.from+"T12:00:00");const end=new Date(w.to+"T12:00:00"),td=new Date(today+"T12:00:00");
      while(d<=end&&d<=td){
        const iso=d.toISOString().slice(0,10);
        wardSessionsOnDate(iso).filter(s=>s.label!=="CPC"&&s.session!=="CPC").forEach(s=>{
          map[w.name].total++;if(wardAtt[s.key]==="attended")map[w.name].attended++;
        });
        d.setDate(d.getDate()+1);
      }
    });
    // Build CPC stats separately from wardManual
    const cpcSessions=wardManual.filter(m=>m.session==="CPC");
    const cpcHeld=cpcSessions.filter(m=>m.date&&m.date<=today);
    const cpcAttended=cpcHeld.filter(m=>wardAtt[`${m.date}-CPC`]==="attended").length;
    const cpcStats={name:"CPC",isCpc:true,total:cpcHeld.length,attended:cpcAttended,
      scheduled:cpcSessions.length,ranges:[],pct:pct(cpcAttended,cpcHeld.length)};
    const wardList=Object.entries(map).map(([name,s])=>({name,...s,pct:pct(s.attended,s.total)}));
    return{wardList,cpcStats};
  },[wardSchedule,wardSessionsOnDate,wardAtt,wardManual]);

  // ── Actions ───────────────────────────────────────────────────────────────
  const mark=(id,status)=>{setAtt(p=>({...p,[id]:status}));setLecOpen(null);showToast(`Marked as ${status}`);};
  const clearMark=id=>{setAtt(p=>{const n={...p};delete n[id];return n;});setLecOpen(null);showToast("Mark cleared");};
  const markWard=(key,status)=>setWardAtt(p=>({...p,[key]:status}));

  const deleteLecture=id=>{
    setLectures(p=>p.filter(l=>l.id!==id));
    setAtt(p=>{const n={...p};delete n[id];return n;});
    setLecOpen(null);setEditLecOpen(null);showToast("Deleted");
  };

  const deleteModule=mid=>{
    if(!confirm("Delete this module and ALL its lectures? This cannot be undone."))return;
    const ids=new Set(lectures.filter(l=>l.moduleId===mid).map(l=>l.id));
    setModules(p=>p.filter(m=>m.id!==mid));
    setLectures(p=>p.filter(l=>l.moduleId!==mid));
    setAtt(p=>{const n={...p};ids.forEach(id=>delete n[id]);return n;});
    showToast("Module deleted");
  };

  const saveLec=(id,changes)=>{setLectures(p=>p.map(l=>l.id===id?{...l,...changes}:l));setEditLecOpen(null);showToast("Saved");};
  const addLecture=lec=>{setLectures(p=>[...p,{...lec,id:Date.now()}]);setAddLecDate(null);setDayOpen(null);showToast("Lecture added");};

  const deleteSub=sid=>{
    if(!confirm("Delete this subject and all its lectures?"))return;
    const ids=new Set(lectures.filter(l=>l.subjectId===sid).map(l=>l.id));
    setSubjects(p=>p.filter(s=>s.id!==sid));
    setLectures(p=>p.filter(l=>l.subjectId!==sid));
    setAtt(p=>{const n={...p};ids.forEach(id=>delete n[id]);return n;});
    showToast("Subject deleted");
  };

  const doImport=(raw,moduleName,modFrom,modTo)=>{
    const rows=parseLectureCSV(raw);
    if(!rows.length){showToast("No lectures found",true);return;}
    const moduleId=Date.now();
    const modColors=[T.primary,"#B8860B","#4ECDC4","#9B59B6","#F3722C","#E84393","#22C55E"];
    const newMod={id:moduleId,name:moduleName||`Module ${modules.length+1}`,color:modColors[modules.length%modColors.length],from:modFrom||null,to:modTo||null};
    const{subjects:ns,lectures:nl}=buildLectures(rows,moduleId,subjects);
    setModules(p=>[...p,newMod]);
    setSubjects(ns);
    setLectures(prev=>{
      const ex=new Set(prev.map(l=>`${l.topic}|${l.date}|${l.moduleId}`));
      return[...prev,...nl.filter(l=>!ex.has(`${l.topic}|${l.date}|${l.moduleId}`))];
    });
    setImportOpen(false);
    showToast(`${newMod.name}: ${nl.length} lectures imported`);
  };

  // ── Export full backup JSON ───────────────────────────────────────────────
  const exportBackup=()=>{
    const backup={
      _version:"3.3",
      _exported:new Date().toISOString(),
      profile,target,sessionsPerDay,
      modules,subjects,lectures,att,
      wardSchedule,wardRoster,wardManual,wardHidden,wardAtt
    };
    const blob=new Blob([JSON.stringify(backup,null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    const safeName=(profile.name||"LectureTrack").replace(/[^a-zA-Z0-9]/g,"_");
    a.href=url;a.download=`${safeName}_backup_${new Date().toISOString().slice(0,10)}.json`;
    a.click();URL.revokeObjectURL(url);
    showToast("Backup exported ✓");
  };

  // ── Import full backup JSON ───────────────────────────────────────────────
  const importBackup=raw=>{
    try{
      const b=JSON.parse(raw);
      if(!b._version)throw new Error("Not a valid LectureTrack backup");
      if(b.profile)setProfile(b.profile);
      if(typeof b.target==="number")setTarget(b.target);
      if(typeof b.sessionsPerDay==="number")setSessionsPerDay(b.sessionsPerDay);
      if(Array.isArray(b.modules))setModules(b.modules);
      if(Array.isArray(b.subjects))setSubjects(b.subjects);
      if(Array.isArray(b.lectures))setLectures(b.lectures);
      if(b.att&&typeof b.att==="object")setAtt(b.att);
      if(Array.isArray(b.wardSchedule))setWardSchedule(b.wardSchedule);
      if(Array.isArray(b.wardRoster))setWardRoster(b.wardRoster);
      if(Array.isArray(b.wardManual))setWardManual(b.wardManual);
      if(Array.isArray(b.wardHidden))setWardHidden(b.wardHidden);
      if(b.wardAtt&&typeof b.wardAtt==="object")setWardAtt(b.wardAtt);
      setImportBackupOpen(false);
      showToast(`Backup restored (v${b._version}) ✓`);
    }catch(e){showToast("Invalid backup file: "+e.message,true);}
  };

  // ── Print (v3.3 — rich report with student profile) ───────────────────────
  const printReport=()=>{
    const ov=overall(),ws=wardStats(),wssObj=wardSubjectStats();
    // BUG FIX: wardSubjectStats returns {wardList, cpcStats} — not a plain array
    const wardList=wssObj.wardList||[];
    const cpcStats=wssObj.cpcStats||null;

    // ── helper: inline SVG donut ──────────────────────────────────────────────
    const donut=(val,total,color,size=120,stroke=14)=>{
      const r=(size-stroke)/2,circ=2*Math.PI*r;
      const missed=total>0?Math.round((total-val)/total*100):0;
      const attPct=total>0?Math.round(val/total*100):0;
      const attDash=attPct/100*circ,missDash=missed/100*circ;
      return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
        <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="#EDE0D0" stroke-width="${stroke}"/>
        <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="#EF4444" stroke-width="${stroke}"
          stroke-dasharray="${circ} 0" stroke-dashoffset="0" transform="rotate(-90 ${size/2} ${size/2})"/>
        <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="${stroke}"
          stroke-dasharray="${attDash} ${circ}" stroke-dashoffset="0" transform="rotate(-90 ${size/2} ${size/2})" stroke-linecap="round"/>
        <text x="${size/2}" y="${size/2-6}" text-anchor="middle" font-size="18" font-weight="800" fill="#2C1810">${attPct}%</text>
        <text x="${size/2}" y="${size/2+10}" text-anchor="middle" font-size="9" fill="#7A5C4F">${val}/${total}</text>
      </svg>`;
    };

    // ── helper: horizontal bar chart (subject attendance) ────────────────────
    const hBar=(items,targetPct)=>{
      if(!items.length)return'<p style="color:#aaa;font-size:12px">No data</p>';
      const sorted=[...items].sort((a,b)=>a.pct-b.pct);
      const rows=sorted.map(it=>{
        const color=it.pct>=targetPct?"#2DB8AB":"#EF4444";
        const bg=it.pct>=targetPct?"#E6FAF8":"#FFE8E8";
        const barW=Math.max(it.pct,1);
        return `<div style="display:flex;align-items:center;gap:8px;margin-bottom:7px">
          <div style="width:130px;font-size:11px;color:#2C1810;font-weight:600;text-overflow:ellipsis;overflow:hidden;white-space:nowrap;flex-shrink:0" title="${it.name}">${it.name}</div>
          <div style="flex:1;background:#F3EDE6;border-radius:6px;height:18px;overflow:hidden;position:relative">
            <div style="width:${barW}%;height:100%;background:${color};border-radius:6px;transition:width .4s"></div>
            <div style="position:absolute;left:0;top:0;width:100%;height:100%;display:flex;align-items:center;padding-left:6px">
              <span style="font-size:10px;font-weight:700;color:${it.pct>30?"#fff":"#2C1810"}">${it.pct}%</span>
            </div>
          </div>
          <div style="width:52px;font-size:10px;color:#7A5C4F;text-align:right;flex-shrink:0">${it.attended}/${it.total}</div>
          <div style="width:44px;background:${bg};color:${color};font-size:9px;font-weight:700;padding:2px 5px;border-radius:5px;text-align:center;flex-shrink:0">${it.pct>=targetPct?"✓ OK":"✗ LOW"}</div>
        </div>`;
      }).join("");
      return `<div>${rows}<div style="display:flex;align-items:center;gap:6px;margin-top:8px;font-size:10px;color:#7A5C4F">
        <div style="width:10px;height:10px;background:#2DB8AB;border-radius:2px"></div>Above target
        <div style="width:10px;height:10px;background:#EF4444;border-radius:2px;margin-left:8px"></div>Below target
        <div style="width:2px;height:14px;background:#800020;margin-left:8px"></div>Target ${targetPct}%
      </div></div>`;
    };

    // ── helper: weekly trend sparkline ───────────────────────────────────────
    const weeklyTrend=()=>{
      const weeks={};
      lectures.filter(l=>l.date&&isPast(l.date)&&!l._unassigned&&att[l.id]!=="cancelled"&&att[l.id]!=="holiday").forEach(l=>{
        const d=new Date(l.date+"T12:00:00");
        const mon=new Date(d);mon.setDate(d.getDate()-((d.getDay()+6)%7));
        const key=mon.toISOString().slice(0,10);
        if(!weeks[key])weeks[key]={key,att:0,total:0};
        weeks[key].total++;
        if(att[l.id]==="attended")weeks[key].att++;
      });
      const pts=Object.values(weeks).sort((a,b)=>a.key.localeCompare(b.key)).map(w=>({...w,pct:w.total>0?Math.round(w.att/w.total*100):0}));
      if(pts.length<2)return'<p style="color:#aaa;font-size:12px;text-align:center">Not enough data for trend (need ≥2 weeks)</p>';
      const W=560,H=120,pad=30,innerW=W-pad*2,innerH=H-pad*2;
      const maxP=100,n=pts.length;
      const xPos=i=>pad+i/(n-1)*innerW;
      const yPos=p=>pad+innerH-(p/maxP)*innerH;
      // target line
      const ty=yPos(target);
      const polyline=pts.map((p,i)=>`${xPos(i)},${yPos(p.pct)}`).join(" ");
      const area=`${xPos(0)},${H-pad} `+pts.map((p,i)=>`${xPos(i)},${yPos(p.pct)}`).join(" ")+` ${xPos(n-1)},${H-pad}`;
      const dots=pts.map((p,i)=>`<circle cx="${xPos(i)}" cy="${yPos(p.pct)}" r="4" fill="${p.pct>=target?"#2DB8AB":"#EF4444"}" stroke="#fff" stroke-width="1.5"/>
        <text x="${xPos(i)}" y="${yPos(p.pct)-8}" text-anchor="middle" font-size="8" fill="#2C1810" font-weight="700">${p.pct}%</text>`).join("");
      const xlabels=pts.filter((_,i)=>i===0||i===pts.length-1||i%Math.max(1,Math.floor(pts.length/5))===0)
        .map(p=>{const i=pts.indexOf(p);const[y,m,d]=p.key.split("-");return`<text x="${xPos(i)}" y="${H-4}" text-anchor="middle" font-size="8" fill="#7A5C4F">${d}/${m}</text>`;}).join("");
      return `<svg width="100%" viewBox="0 0 ${W} ${H}" style="overflow:visible">
        <defs><linearGradient id="tg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#800020" stop-opacity="0.18"/><stop offset="100%" stop-color="#800020" stop-opacity="0"/></linearGradient></defs>
        <polygon points="${area}" fill="url(#tg)"/>
        <polyline points="${polyline}" fill="none" stroke="#800020" stroke-width="2" stroke-linejoin="round"/>
        <line x1="${pad}" y1="${ty}" x2="${W-pad}" y2="${ty}" stroke="#DAA520" stroke-width="1.5" stroke-dasharray="5,3"/>
        <text x="${W-pad+4}" y="${ty+4}" font-size="9" fill="#DAA520" font-weight="700">${target}%</text>
        ${dots}${xlabels}
        <text x="${pad}" y="${pad-6}" font-size="9" fill="#7A5C4F">100%</text>
        <text x="${pad}" y="${H-pad+3}" font-size="9" fill="#7A5C4F">0%</text>
      </svg>`;
    };

    // ── helper: day-of-week missed bar ────────────────────────────────────────
    const dowChart=()=>{
      const days=["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
      const counts=Array(7).fill(0).map(()=>({att:0,miss:0}));
      lectures.filter(l=>l.date&&isPast(l.date)&&!l._unassigned&&att[l.id]!=="cancelled"&&att[l.id]!=="holiday").forEach(l=>{
        const dow=(new Date(l.date+"T12:00:00").getDay()+6)%7; // 0=Mon
        if(att[l.id]==="attended")counts[dow].att++;
        else counts[dow].miss++;
      });
      const maxV=Math.max(...counts.map(c=>c.att+c.miss),1);
      const bars=days.map((d,i)=>{
        const total=counts[i].att+counts[i].miss;
        const missH=total>0?Math.round(counts[i].miss/maxV*60):0;
        const attH=total>0?Math.round(counts[i].att/maxV*60):0;
        return `<div style="display:flex;flex-direction:column;align-items:center;gap:2px;flex:1">
          <div style="font-size:9px;font-weight:700;color:#EF4444">${counts[i].miss>0?counts[i].miss:""}</div>
          <div style="width:100%;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:60px;gap:1px">
            <div style="width:70%;background:#EF4444;height:${missH}px;border-radius:3px 3px 0 0" title="${counts[i].miss} missed"></div>
            <div style="width:70%;background:#2DB8AB;height:${attH}px" title="${counts[i].att} attended"></div>
          </div>
          <div style="font-size:10px;color:#7A5C4F;font-weight:600">${d}</div>
        </div>`;
      }).join("");
      return `<div style="display:flex;gap:4px;align-items:flex-end;padding:8px 0">${bars}</div>
        <div style="display:flex;gap:12px;font-size:10px;color:#7A5C4F;margin-top:4px">
          <span><span style="display:inline-block;width:10px;height:10px;background:#2DB8AB;border-radius:2px;margin-right:3px"></span>Attended</span>
          <span><span style="display:inline-block;width:10px;height:10px;background:#EF4444;border-radius:2px;margin-right:3px"></span>Missed</span>
        </div>`;
    };

    // ── helper: ward Gantt timeline ───────────────────────────────────────────
    const wardGantt=()=>{
      if(!wardSchedule.length)return'<p style="color:#aaa;font-size:12px">No ward rotations scheduled</p>';
      const allDates=wardSchedule.flatMap(w=>[new Date(w.from+"T12:00:00"),new Date(w.to+"T12:00:00")]);
      const minD=new Date(Math.min(...allDates)),maxD=new Date(Math.max(...allDates));
      const span=Math.max((maxD-minD)/(1000*60*60*24),1);
      const rows=Object.entries(wardList.reduce((acc,w)=>{acc[w.name]=w;return acc;},{})).map(([name,stats])=>{
        const wardEntries=wardSchedule.filter(w=>w.name===name);
        const wardEntry=wardSchedule.find(w=>w.name===name);
        const color=(wardEntry&&wardEntry.color)?wardEntry.color:"#800020";
        const bars=wardEntries.map(w=>{
          const s=new Date(w.from+"T12:00:00"),e=new Date(w.to+"T12:00:00");
          const left=Math.round((s-minD)/(1000*60*60*24)/span*100);
          const width=Math.max(Math.round((e-s)/(1000*60*60*24)/span*100),1);
          const isPastW=e<new Date();
          return `<div style="position:absolute;left:${left}%;width:${width}%;background:${isPastW?color:color+"80"};height:18px;border-radius:4px;top:0;display:flex;align-items:center;padding:0 4px;overflow:hidden" title="${dispDate(w.from)} → ${dispDate(w.to)}">
            <span style="font-size:8px;color:#fff;font-weight:700;white-space:nowrap;overflow:hidden">${dispDate(w.from)}</span>
          </div>`;
        }).join("");
        const pctColor=stats.pct>=target?"#2DB8AB":"#EF4444";
        return `<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
          <div style="width:100px;font-size:11px;font-weight:700;color:#2C1810;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${name}</div>
          <div style="flex:1;position:relative;height:18px;background:#F3EDE6;border-radius:4px">${bars}</div>
          <div style="width:40px;font-size:11px;font-weight:800;color:${pctColor};text-align:right;flex-shrink:0">${stats.pct}%</div>
        </div>`;
      }).join("");
      // x-axis month labels
      const months=[];let d=new Date(minD);
      while(d<=maxD){const left=Math.round((d-minD)/(1000*60*60*24)/span*100);months.push(`<div style="position:absolute;left:${left}%;font-size:9px;color:#7A5C4F;transform:translateX(-50%)">${d.toLocaleDateString("en-IN",{month:"short"})}</div>`);d=new Date(d);d.setMonth(d.getMonth()+1);}
      return `<div>${rows}<div style="position:relative;height:16px;margin-left:110px;margin-top:4px">${months.join("")}</div></div>`;
    };

    // ── helper: streak calc ───────────────────────────────────────────────────
    const streakCalc=()=>{
      const held=lectures.filter(l=>l.date&&isPast(l.date)&&!l._unassigned&&att[l.id]!=="cancelled"&&att[l.id]!=="holiday").sort((a,b)=>a.date.localeCompare(b.date));
      let curAtt=0,maxAtt=0,curMiss=0,maxMiss=0,tmp=0,tmpM=0;
      held.forEach(l=>{
        if(att[l.id]==="attended"){tmp++;tmpM=0;}else{tmpM++;tmp=0;}
        if(tmp>maxAtt)maxAtt=tmp;if(tmpM>maxMiss)maxMiss=tmpM;
      });
      // current streaks from end
      let i=held.length-1;curAtt=0;curMiss=0;
      while(i>=0&&att[held[i].id]==="attended"){curAtt++;i--;}
      i=held.length-1;
      while(i>=0&&att[held[i].id]!=="attended"){curMiss++;i--;}
      return{curAtt,maxAtt,curMiss,maxMiss};
    };

    // ── helper: projection ────────────────────────────────────────────────────
    const projection=()=>{
      const subData=subjects.map(s=>{
        const st=subStats(s.id);
        const rem=st.scheduled-st.total;
        const projPct=st.scheduled>0?Math.round((st.attended+rem)/st.scheduled*100):st.pct;
        const mustAttend=needMoreFromScheduled(st.attended,st.total,st.scheduled,target);
        const canSkipN=canSkipFromScheduled(st.attended,st.total,st.scheduled,target);
        return{name:s.name,color:s.color,...st,rem,projPct,mustAttend,canSkipN};
      });
      return subData;
    };

    // ── helper: morning vs evening ward split ─────────────────────────────────
    const wardSessionSplit=()=>{
      let mAtt=0,mTotal=0,eAtt=0,eTotal=0;
      wardSchedule.forEach(w=>{
        let d=new Date(w.from+"T12:00:00");const end=new Date(w.to+"T12:00:00"),td=new Date(todayISO()+"T12:00:00");
        while(d<=end&&d<=td){
          const iso=d.toISOString().slice(0,10);
          wardSessionsOnDate(iso).filter(s=>s.label!=="CPC").forEach(s=>{
            if(s.label==="Morning"||s.session==="Morning"){mTotal++;if(wardAtt[s.key]==="attended")mAtt++;}
            else{eTotal++;if(wardAtt[s.key]==="attended")eAtt++;}
          });
          d.setDate(d.getDate()+1);
        }
      });
      return{mAtt,mTotal,mPct:pct(mAtt,mTotal),eAtt,eTotal,ePct:pct(eAtt,eTotal)};
    };

    // ── build data ────────────────────────────────────────────────────────────
    const strk=streakCalc();
    const proj=projection();
    const split=wardSessionSplit();
    const dangerSubs=subjects.filter(s=>subStats(s.id).pct<target).map(s=>{const st=subStats(s.id);return{name:s.name,color:s.color,...st};}).sort((a,b)=>a.pct-b.pct);
    const subChartData=subjects.map(s=>{const st=subStats(s.id);return{name:s.name,color:s.color,...st};});
    const wardChartData=wardList.map(w=>({name:w.name,attended:w.attended,total:w.total,pct:w.pct}));
    if(cpcStats&&cpcStats.total>0)wardChartData.push({name:"CPC",attended:cpcStats.attended,total:cpcStats.total,pct:cpcStats.pct});

    const modRows=modules.map(m=>{
      const st=moduleStats(m.id);
      const ok=st.pct>=target;
      const barW=Math.max(st.pct,1);
      return`<tr>
        <td style="border-left:4px solid ${m.color};padding-left:10px;font-weight:700">${m.name}</td>
        <td>${st.attended}</td><td>${st.total}</td>
        <td><div style="background:#F3EDE6;border-radius:5px;height:14px;width:80px;overflow:hidden"><div style="width:${barW}%;height:100%;background:${ok?"#2DB8AB":"#EF4444"}"></div></div></td>
        <td style="font-weight:800;color:${ok?"#2DB8AB":"#EF4444"}">${st.pct}%</td>
      </tr>`;
    }).join("");

    const subRows=proj.map(s=>{
      const ok=s.pct>=target;
      const barW=Math.max(s.pct,1);
      const mustStr=s.mustAttend===Infinity?"❌ Impossible":s.mustAttend===0?`✅ Skip ${s.canSkipN}`:`⚠️ Need ${s.mustAttend} more`;
      return`<tr>
        <td style="border-left:4px solid ${s.color};padding-left:8px;font-weight:600">${s.name}</td>
        <td>${s.attended}</td><td>${s.total}</td>
        <td style="color:#EF4444">${s.total-s.attended}</td>
        <td>${s.scheduled}</td><td style="color:#6C63FF">${s.rem}</td>
        <td><div style="background:#F3EDE6;border-radius:5px;height:12px;width:70px;overflow:hidden"><div style="width:${barW}%;height:100%;background:${ok?"#2DB8AB":"#EF4444"}"></div></div></td>
        <td style="font-weight:800;color:${ok?"#2DB8AB":"#EF4444"}">${s.pct}%</td>
        <td style="font-size:11px;color:${ok?"#2DB8AB":s.mustAttend===Infinity?"#7A5C4F":"#EF4444"}">${mustStr}</td>
      </tr>`;
    }).join("");

    const wardSubRows=wardChartData.map(w=>{
      const ok=w.pct>=target;
      const barW=Math.max(w.pct,1);
      return`<tr>
        <td style="font-weight:600">${w.name}</td>
        <td>${w.attended}</td><td>${w.total}</td>
        <td style="color:#EF4444">${w.total-w.attended}</td>
        <td><div style="background:#F3EDE6;border-radius:5px;height:12px;width:70px;overflow:hidden"><div style="width:${barW}%;height:100%;background:${ok?"#2DB8AB":"#EF4444"}"></div></div></td>
        <td style="font-weight:800;color:${ok?"#2DB8AB":"#EF4444"}">${w.pct}%</td>
      </tr>`;
    }).join("");

    const schedRows=wardSchedule.map(w=>{
      const today=todayISO();const isCur=w.from<=today&&w.to>=today,isPastW=w.to<today;
      const badge=isCur?'<span style="background:#DCFCE7;color:#166534;padding:1px 7px;border-radius:10px;font-size:10px;font-weight:700">● Active</span>':isPastW?'<span style="color:#aaa;font-size:10px">Done</span>':'<span style="color:#6C63FF;font-size:10px">Upcoming</span>';
      return`<tr><td style="font-weight:600">${w.name} ${badge}</td><td>${dispDate(w.from)}</td><td>${dispDate(w.to)}</td></tr>`;
    }).join("");

    const dangerRows=dangerSubs.map(s=>`<div style="display:flex;align-items:center;gap:8px;padding:8px 10px;background:#FFF5F5;border-radius:8px;margin-bottom:5px;border-left:4px solid ${s.color}">
      <div style="flex:1;font-weight:700;font-size:13px;color:#2C1810">${s.name}</div>
      <div style="font-size:12px;color:#EF4444;font-weight:800">${s.pct}%</div>
      <div style="font-size:11px;color:#7A5C4F">Need ${needMore(s.attended,s.total,target)} more</div>
    </div>`).join("");

    // ── overall status banner ─────────────────────────────────────────────────
    const diff=ov.pct-target;
    const bannerColor=ov.pct>=target?"#166534":ov.pct>=target-5?"#92400E":"#991B1B";
    const bannerBg=ov.pct>=target?"#DCFCE7":ov.pct>=target-5?"#FEF3C7":"#FEE2E2";
    const bannerMsg=ov.pct>=target?`🎉 On Track — ${diff>=0?"+"+diff:diff}% above target`
      :ov.pct>=target-5?`⚠️ Borderline — ${Math.abs(diff)}% below target. Attend consistently!`

${dangerSubs.length>0?`

<div class="card" style="padding:10px 14px">${dangerRows}</div>`:""}

</div>

</div></body></html>`);
    win.document.close();

  const ov=overall(),ws=wardStats();

        input,select,textarea{font-family:inherit;border:1.5px solid ${T.border};border-radius:11px;padding:10px 13px;font-size:14px;outline:none;width:100%;background:${T.white};transition:border .2s}
        input:focus,select:focus,textarea:focus{border-color:${T.primary}}
        label{font-size:12px;font-weight:600;color:${T.textSub};display:block;margin:12px 0 4px}
        .overlay{position:fixed;inset:0;background:#2C181066;z-index:60;display:flex;align-items:flex-end;justify-content:center}

          <div style={{display:"flex",flexDirection:"column",gap:6,alignItems:"flex-end"}}>
            <div style={{display:"flex",gap:5}}>

              <button className="btn" onClick={()=>setExportOpen(true)} style={{padding:"6px 10px",background:"#ffffff20",color:"#fff",fontSize:11,border:`1px solid ${T.goldLight}50`}}>💾 Export</button>

        <div style={{display:"flex",gap:7}}>

        {tab==="ward" && <WardTab {...{wardCalYear,wardCalMonth,setWardCalYear,setWardCalMonth,wardSchedule,wardRoster,wardManual,setWardManual,wardAtt,markWard,sessionsPerDay,setSessionsPerDay,currentWard,rosterForDate,wardSessionsOnDate,setWardImportOpen,openWardImport,setWardDayOpen,setEditWardSession,setManageWardOpen}}/>}

      {/* MODALS */}

      {wardImportOpen&&<Modal onClose={()=>setWardImportOpen(false)}><WardImportSheet initialTab={wardImportTab} onImportSchedule={r=>{const WCLR={"Surgery":"#E63946","Medicine":"#4ECDC4","Paeds Surgery":"#F3722C","Paeds Medicine":"#FF8B5E","Psychiatry":"#9B59B6","Obs & Gynae":"#E84393","Obs & Gyne":"#E84393","Obstetrics & Gynaecology":"#E84393","Orthopaedics":"#8E44AD","ENT":"#1ABC9C","Ophthalmology":"#2ECC71","Neurosurgery":"#7D6608","Urology":"#117864","Nephrology":"#1A5276","Cardiology":"#A93226","Pulmonology":"#2980B9","Radiology":"#3498DB","Community Medicine":"#27AE60","Forensic Medicine":"#784212","Neurology":"#6C3483","Paediatrics":"#FF8B5E","Paediatric":"#FF8B5E","Surgical":"#E63946","Medical":"#4ECDC4","Paed Emergency":"#F97316","Gynae Emergency":"#E84393","Emergency":"#DC2626","General":"#800020"};setWardSchedule(parseWardScheduleCSV(r).map((w,i)=>({...w,id:w.id||Date.now()+i,color:w.color||WCLR[w.name]||WCLR[Object.keys(WCLR).find(k=>w.name.toLowerCase().includes(k.toLowerCase()))]||"#6366F1"})));setWardImportOpen(false);showToast("Ward schedule imported");}} onImportRoster={r=>{const rows=parseWardRosterCSV(r);setWardRoster(prev=>{const ex=new Set(prev.map(x=>x.date));return[...prev,...rows.filter(x=>!ex.has(x.date))];});setWardImportOpen(false);showToast(`Roster: ${rows.length} days`);}} sessionsPerDay={sessionsPerDay} setSessionsPerDay={setSessionsPerDay} onClose={()=>setWardImportOpen(false)}/></Modal>}
      {editSubOpen&&<Modal onClose={()=>setEditSubOpen(null)}><EditSubSheet sub={editSubOpen} onSave={s=>{setSubjects(p=>p.map(x=>x.id===s.id?s:x));setEditSubOpen(null);showToast("Subject updated");}} onClose={()=>setEditSubOpen(null)}/></Modal>}
      {addSubOpen&&<Modal onClose={()=>setAddSubOpen(false)}><AddSubSheet onSave={form=>{setSubjects(p=>[...p,{id:Date.now(),...form}]);setAddSubOpen(false);showToast("Subject added");}} onClose={()=>setAddSubOpen(false)}/></Modal>}
      {manageWardOpen&&<Modal onClose={()=>setManageWardOpen(false)}><ManageWardSheet wardSchedule={wardSchedule} setWardSchedule={setWardSchedule} editWardScheduleEntry={editWardScheduleEntry} setEditWardScheduleEntry={setEditWardScheduleEntry} onClose={()=>setManageWardOpen(false)} showToast={showToast}/></Modal>}
      {editWardSession&&<Modal onClose={()=>setEditWardSession(null)}><EditWardSessionSheet session={editWardSession} wardManual={wardManual} setWardManual={setWardManual} wardHidden={wardHidden} setWardHidden={setWardHidden} wardAtt={wardAtt} markWard={markWard} onClose={()=>setEditWardSession(null)} showToast={showToast}/></Modal>}
      {toast&&<div style={{position:"fixed",bottom:88,left:"50%",transform:"translateX(-50%)",background:toast.err?"#EF4444":T.text,color:"#fff",padding:"11px 20px",borderRadius:14,fontSize:13,fontWeight:500,zIndex:200,animation:"su .2s ease",whiteSpace:"nowrap",boxShadow:"0 4px 20px #0003"}}>{toast.msg}</div>}

      {/* PROFILE MODAL */}
      {profileOpen&&<Modal onClose={()=>setProfileOpen(false)}><ProfileSheet profile={profile} setProfile={setProfile} onClose={()=>setProfileOpen(false)} showToast={showToast}/></Modal>}

      {/* EXPORT / BACKUP MODAL */}
      {exportOpen&&<Modal onClose={()=>setExportOpen(false)}><ExportSheet onExport={exportBackup} onImportOpen={()=>{setExportOpen(false);setImportBackupOpen(true);}} onClose={()=>setExportOpen(false)} profile={profile}/></Modal>}

      {/* IMPORT BACKUP MODAL */}
      {importBackupOpen&&<Modal onClose={()=>setImportBackupOpen(false)}><ImportBackupSheet onImport={importBackup} onClose={()=>setImportBackupOpen(false)}/></Modal>}
    </div>
  );
}

function Modal({children,onClose}){
  return(<div className="overlay" onClick={onClose}><div className="sheet slide" onClick={e=>e.stopPropagation()}>{children}</div></div>);
}

    <div className="slide" style={{paddingTop:18}}>

        </div>
      )}

      {/* TODAY */}
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
        <div style={{flex:1,height:1,background:`linear-gradient(90deg,${T.goldLight},transparent)`}}/>
        <div style={{fontWeight:800,fontSize:13,color:T.primary,letterSpacing:1}}>TODAY · {new Date().toLocaleDateString("en-IN",{weekday:"long",day:"numeric",month:"short"})}</div>
        <div style={{flex:1,height:1,background:`linear-gradient(270deg,${T.goldLight},transparent)`}}/>
      </div>

      {/* TODAY LECTURES (first) */}

        todayLecs.length>0

          </div>

      {!hasLectures&&(
        <div className="card" style={{padding:14,display:"flex",alignItems:"center",gap:10,marginBottom:8,cursor:"pointer",borderLeft:`4px solid ${T.primary}`}} onClick={()=>setImportOpen(true)}>
          <span style={{fontSize:22}}>📚</span>

      {/* TODAY WARD (below lectures) */}

            <span style={{fontSize:20}}>📚</span><span style={{fontSize:13}}>No lectures tomorrow</span>
          </div>

// ─── TAB 2: CALENDAR ──────────────────────────────────────────────────────────
function CalTab({calYear,calMonth,setCalYear,setCalMonth,lecsOnDate,subjects,modules,att,setDayOpen,setImportOpen,setManageModulesOpen}){
  const today=todayISO();
  const days=new Date(calYear,calMonth+1,0).getDate(),first=new Date(calYear,calMonth,1).getDay();
  const prevMonth=()=>{if(calMonth===0){setCalYear(y=>y-1);setCalMonth(11);}else setCalMonth(m=>m-1);};
  const nextMonth=()=>{if(calMonth===11){setCalYear(y=>y+1);setCalMonth(0);}else setCalMonth(m=>m+1);};
  const monthLabel=new Date(calYear,calMonth,1).toLocaleDateString("en-IN",{month:"long",year:"numeric"});
  const weeks=[];const total=first+days;
  for(let w=0;w<Math.ceil(total/7);w++){const week=[];for(let d=0;d<7;d++){const ci=w*7+d,day=ci-first+1;week.push(day>=1&&day<=days?day:null);}weeks.push(week);}

  return(
    <div className="slide" style={{paddingTop:16}}>
      <div style={{display:"flex",gap:7,marginBottom:14}}>
        <button className="btn" onClick={()=>setImportOpen(true)} style={{flex:2,padding:"11px 0",background:T.primary,color:"#fff",fontSize:13,display:"flex",alignItems:"center",justifyContent:"center",gap:6,borderRadius:14}}>
          ⬆️ Import Timetable
        </button>
        <button className="btn" onClick={()=>setManageModulesOpen(true)} style={{flex:1,padding:"11px 0",background:T.cream,color:T.text,fontSize:12,border:`1px solid ${T.border}`,borderRadius:14}}>
          📦 Modules
        </button>
      </div>

      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8,padding:"0 2px"}}>
        <button className="btn" onClick={prevMonth} style={{padding:"6px 14px",background:T.card,fontSize:13,color:T.text,boxShadow:"0 1px 5px #80002015",border:`1px solid ${T.border}`}}>‹ Prev</button>
        <div style={{fontWeight:800,fontSize:15,color:T.primary}}>● {monthLabel}</div>
        <button className="btn" onClick={nextMonth} style={{padding:"6px 14px",background:T.card,fontSize:13,color:T.text,boxShadow:"0 1px 5px #80002015",border:`1px solid ${T.border}`}}>Next ›</button>
      </div>

      <div style={{display:"flex",gap:7,flexWrap:"wrap",marginBottom:10,padding:"0 2px"}}>
        {subjects.map(s=>(<div key={s.id} style={{display:"flex",alignItems:"center",gap:4,fontSize:10,color:T.textSub}}><div style={{width:7,height:7,borderRadius:"50%",background:s.color}}/>{s.name}</div>))}
      </div>

      <div className="card" style={{padding:10,marginBottom:4}}>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:4}}>
          {["SUN","MON","TUE","WED","THU","FRI","SAT"].map(d=>(<div key={d} style={{textAlign:"center",fontSize:8,fontWeight:700,color:T.textMuted,padding:"3px 0"}}>{d}</div>))}
        </div>
        {weeks.map((week,wi)=>(
          <div key={wi} style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:2}}>
            {week.map((day,di)=>{
              if(!day)return<div key={di}/>;
              const iso=`${calYear}-${String(calMonth+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
              const lecs=lecsOnDate(iso),hasLec=lecs.length>0,isToday=iso===today;
              const allAtt=hasLec&&lecs.every(l=>att[l.id]==="attended");
              const allMiss=hasLec&&lecs.every(l=>att[l.id]==="missed");
              const allCanc=hasLec&&lecs.every(l=>att[l.id]==="cancelled");
              let cellBg=T.white;
              if(allAtt)cellBg="#DCFCE7";else if(allMiss)cellBg="#FEE2E2";else if(allCanc)cellBg="#F3F4F6";
              return(
                <div key={di} onClick={()=>setDayOpen(iso)}
                  style={{background:cellBg,borderRadius:9,border:isToday?`2px solid ${T.primary}`:`1.5px solid ${T.border}`,cursor:"pointer",minHeight:hasLec?86:54,display:"flex",flexDirection:"column",overflow:"hidden",transition:"background .15s"}}>
                  <div style={{display:"flex",alignItems:"center",padding:"3px 4px 2px"}}>
                    <span style={{fontSize:10,fontWeight:isToday?800:500,color:isToday?T.primary:T.text}}>{String(day).padStart(2,"0")}</span>
                    <span style={{fontSize:7,color:T.textMuted,marginLeft:2}}>{"SMTWTFS"[di]}</span>
                  </div>
                  <div style={{flex:1,display:"flex",flexDirection:"column",gap:1,padding:"0 2px 3px"}}>
                    {lecs.map(l=>{
                      const sub=subjects.find(s=>s.id===l.subjectId),col=sub?.color||T.primary,status=att[l.id];
                      let lBg="#F9FAFB";
                      if(status==="attended")lBg="#DCFCE7";else if(status==="missed")lBg="#FEE2E2";else if(status==="cancelled")lBg="#E5E7EB";else if(status==="holiday")lBg="#FEF9C3";
                      return(
                        <div key={l.id} style={{display:"flex",borderRadius:4,overflow:"hidden",background:lBg}}>
                          <div style={{width:3,background:col,flexShrink:0}}/>
                          <div style={{flex:1,padding:"2px 3px"}}>
                            <div style={{fontSize:7,fontWeight:700,color:col,lineHeight:1}}>{l.isAssessment?"📝TEST":sub?.name?.slice(0,5)||"—"}</div>
                            <div style={{fontSize:7,fontWeight:600,color:T.text,lineHeight:1.2,overflow:"hidden",display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical"}}>{l.isAssessment?"Assessment":l.topic}</div>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              );
            })}
          </div>
        ))}
      </div>
      <div style={{height:8}}/>
    </div>
  );
}
